        body: '<p>DFDs use <b>stepwise refinement</b> (also called "leveling" or "decomposition") to manage complexity. You start with the most abstract view and progressively add detail.</p><div class="learn-def"><b>Three Levels of DFD Refinement:</b><br><br><b>Level 0 — Context Diagram:</b> The entire system as a SINGLE process (one bubble). Shows only the external entities (sources/destinations) and the data flows between them and the system. No internal detail. This establishes the system boundary — what is inside vs outside.<br><br><b>Level 1 — Overview Diagram:</b> "Explode" the single process into its major sub-processes (typically 3-7 processes). Shows the main data stores and the data flows between processes. Each process represents a major function of the system.<br><br><b>Level 2+ — Detailed Diagrams:</b> Each Level 1 process can be further decomposed into its sub-processes. Continue decomposing until each process is simple enough to specify with a <b>mini-spec</b> (a brief description of the process logic, often using structured English, decision tables, or decision trees).</div><div class="learn-warn"><b>Key rules for DFD refinement:</b><br><b>Conservation of data:</b> Data flowing into a parent process must be accounted for in its decomposition (no data appears or disappears)<br><b>Balancing:</b> Each level must be consistent with the level above (same inputs and outputs)<br><b>7 ± 2 rule:</b> Each diagram should have roughly 3-7 processes (Miller\'s Law applied to DFDs)<br><b>No control flow:</b> DFDs show DATA flow, not control flow. There are no if-then-else or loops in a DFD — those appear in the process specifications.</div><div class="learn-example"><b>Example Refinement:</b><br>Context Diagram: One bubble "Sally\'s Software Shop System" with flows from Customer and to Supplier<br>Level 1: "Process Order" | "Manage Inventory" | "Handle Payments" | "Generate Reports"<br>Level 2 of "Process Order": "Validate Order" → "Check Availability" → "Calculate Total" → "Confirm Order"</div>'

itical systems where mathematical proof of correctness is needed</div>'

ndary class receives the external event, the control class orchestrates the response, and entity classes hold/manage the persistent data.</div><p>This three-type classification helps ensure <b>separation of concerns</b>: if the UI changes, only boundary classes are affected; if business rules change, only entity classes change; if the workflow changes, only control classes change.</p>'

Button (inside the elevator, one per floor) and Floor Button (on each floor landing, up/down). This subclass distinction emerged naturally from analyzing how buttons behave differently in different contexts.<br>Further analysis through CRC cards led to discovering the need for an Elevator Controller class.</div><div class="learn-warn"><b>Important:</b> Noun extraction is a starting point, not the final answer. The initial class list will be refined through CRC card analysis, class diagram iteration, and responsibility assignment. Expect to add, remove, and restructure classes as understanding deepens.</div>'

      {
        title: 'CRC Cards & Responsibility-Driven Design',
        body: '<p><b>CRC Cards</b> (Class-Responsibility-Collaboration cards) are a powerful, low-tech tool for discovering and refining OO designs. Invented by Ward Cunningham and Kent Beck, they use physical index cards to encourage collaborative design thinking.</p><div class="learn-def"><b>CRC Card Structure:</b><br><b>Class name</b> — written at the top of the card<br><b>Responsibilities</b> (left column) — what the class DOES (its duties and obligations)<br><b>Collaborators</b> (right column) — other classes it works WITH to fulfill responsibilities</div><div class="learn-example"><b>Example CRC Card — Button Class:</b><br>Class: Button<br>Responsibilities: Turn on when pressed | Turn off when serviced | Know if currently illuminated<br>Collaborators: Elevator Controller (notifies when pressed) | Elevator (serviced when elevator arrives)</div><p><b>The CRC Process:</b></p><p>Team members <b>role-play as objects</b>. Each person holds one or more CRC cards and "acts" as that class. When a scenario is walked through (e.g., "user presses floor 5 button"), the person holding the Button card describes what Button does and passes responsibility to the appropriate collaborator. This <b>physical simulation</b> reveals missing classes, misplaced responsibilities, and communication gaps.</p><div class="learn-def"><b>Responsibility-Driven Design Principle:</b> Objects manage their own state and behavior. The key mindset shift:<br><b>WRONG (procedural):</b> "Turn on the button" — external code manipulates the button<br><b>RIGHT (OO):</b> "Send message to Button asking it to turn itself on" — the button manages its own state<br>Objects should be <b>asked</b> to do things, not <b>told</b> how. Each object is an autonomous agent responsible for its own behavior.</div><p><b>Benefits of CRC cards:</b> Low-tech (no special tools needed), encourages teamwork and discussion, physically manipulable (easy to reorganize), great for brainstorming, forces concrete thinking about interactions, and naturally discovers missing classes when no card "wants" a particular responsibility.</p><div class="learn-warn"><b>Key insight from elevator problem:</b> When using CRC cards, the initial design placed too much responsibility on the Elevator Controller card — one person was overwhelmed handling all decisions. This physically demonstrated the "God class" problem and motivated the redistribution of responsibilities to specialized classes.</div>'

      {
        title: 'The God Class Antipattern & Distributed Architecture',
        body: '<p>The <b>God class</b> (also called a "blob" or "monster class") is one of the most common and dangerous antipatterns in OO design. It occurs when one class accumulates too many responsibilities, becoming the central hub through which everything flows.</p><div class="learn-def"><b>God Class:</b> A single class that has too much control — it knows too much about other classes, makes too many decisions, and has too many responsibilities. It violates the single responsibility principle and creates a fragile, hard-to-maintain design.</div><p><b>Problems with God classes:</b></p><table class="learn-table"><tr><th>Problem</th><th>Consequence</th></tr><tr><td>Violates single responsibility</td><td>The class has no clear, focused purpose</td></tr><tr><td>Hard to maintain</td><td>Any feature change requires modifying this one massive class</td></tr><tr><td>Hard to test</td><td>Too many intertwined behaviors to isolate for unit testing</td></tr><tr><td>Creates high coupling</td><td>Everything depends on the God class; it depends on everything</td></tr><tr><td>Reduces cohesion</td><td>One class doing many unrelated things = low cohesion</td></tr><tr><td>Team bottleneck</td><td>Multiple developers editing the same file creates merge conflicts</td></tr></table><div class="learn-example"><b>Elevator Problem — God Class Evolution:</b><br>The class diagram went through <b>4 iterations</b>:<br><b>Iteration 1:</b> Simple classes (Elevator, Button) with no controller — but who decides what to do?<br><b>Iteration 2:</b> Added Elevator Controller to make decisions — centralized ALL control logic<br><b>Iteration 3:</b> Realized Elevator Controller was a God class — it handled floor requests, elevator movement, door operations, scheduling, and sensor reading<br><b>Iteration 4:</b> Distributed architecture — broke God class into focused specialists</div><div class="learn-def"><b>The Solution — Distributed Decentralized Architecture:</b><br>Replace the God class with multiple specialized subcontrollers:<br><b>Floor Subcontroller:</b> Handles floor-level logic (floor button presses, arrival notifications for each floor)<br><b>Elevator Subcontroller:</b> Handles elevator-level logic (door open/close, movement start/stop, elevator button management)<br><b>Scheduler:</b> The core algorithm — decides which elevator responds to which floor request (the "brains" of the system)<br><b>Sensor:</b> Detects elevator position within the shaft and reports to subcontrollers</div><div class="learn-warn"><b>Key design insight:</b> Each subcontroller is <b>focused and cohesive</b> (high cohesion). Communication happens through well-defined messages between objects (low coupling). No single class "knows everything." This distributed approach mirrors how real elevator systems work — with local controllers for each elevator and each floor, coordinated by a central scheduler.</div>'

        title: 'Dynamic Modeling with Statecharts',
        body: '<p>A class diagram shows the <b>static structure</b> of a system — what classes exist, their attributes, and relationships. But software also has <b>behavior over time</b>. Dynamic modeling captures how objects change state in response to events.</p><div class="learn-def"><b>Statecharts</b> (Harel, 1987): Extended state transition diagrams that model the dynamic behavior of individual objects or the system as a whole. They are part of UML and complement class diagrams.</div><p><b>Statechart elements:</b></p><table class="learn-table"><tr><th>Element</th><th>Symbol</th><th>Description</th></tr><tr><td>State</td><td>Rounded rectangle</td><td>A condition or situation during the life of an object (e.g., Idle, Moving Up)</td></tr><tr><td>Transition</td><td>Arrow between states</td><td>A change from one state to another, triggered by an event</td></tr><tr><td>Event</td><td>Label on transition</td><td>Something that happens (button pressed, timer expired, floor reached)</td></tr><tr><td>Guard</td><td>[condition] on transition</td><td>A boolean condition that must be true for the transition to fire (e.g., [no pending requests])</td></tr><tr><td>Action</td><td>/action on transition</td><td>What happens during the transition (e.g., /start motor, /open doors)</td></tr><tr><td>Initial state</td><td>Filled black circle</td><td>Where the object begins its life</td></tr><tr><td>Final state</td><td>Bull\'s eye (circle within circle)</td><td>Where the object\'s life ends (if applicable)</td></tr></table><div class="learn-def"><b>Transition notation:</b> event [guard] / action<br>Example: buttonPressed [floor != currentFloor] / startMotor<br>Read as: "When buttonPressed occurs, IF floor is not the current floor, THEN start the motor and transition to the next state."</div><div class="learn-example"><b>Elevator Statechart:</b><br><b>States:</b> Idle, Moving Up, Moving Down, Doors Opening, Doors Open, Doors Closing<br><b>Sample Transitions:</b><br>Idle → Moving Up: floorRequest [requestedFloor > currentFloor] / startMotorUp<br>Idle → Moving Down: floorRequest [requestedFloor &lt; currentFloor] / startMotorDown<br>Moving Up → Doors Opening: floorReached [isRequestedFloor] / stopMotor, openDoors<br>Doors Opening → Doors Open: doorsFullyOpen / startTimer<br>Doors Open → Doors Closing: timerExpired / closeDoors<br>Doors Closing → Idle: doorsFullyClosed [no pending requests]<br>Doors Closing → Moving Up: doorsFullyClosed [pending request above] / startMotorUp</div><div class="learn-warn"><b>Key relationship:</b> Class diagram = WHAT objects exist (static). Statechart = HOW they behave over time (dynamic). Every class with complex, state-dependent behavior should have its own statechart. Simple classes (like a data-only entity) may not need one. The statechart later becomes the basis for detailed design (PDL/pseudocode) in the design phase.</div>'

      {
        title: 'Functional Modeling & MSG Foundation OOA',
        body: '<p>The <b>functional model</b> is the third leg of OO analysis, complementing the static model (class diagram) and the dynamic model (statecharts). It describes <b>WHAT the system computes</b> — the data transformations and computations performed by the system.</p><div class="learn-def"><b>Three Models in OOA:</b><br><b>Static model (class diagram):</b> What objects exist and their relationships<br><b>Dynamic model (statecharts):</b> How objects change state over time<br><b>Functional model:</b> What computations the system performs (data in → data out)</div><p>In OO analysis, the functional model is often expressed through <b>use case descriptions</b> (the step-by-step flow of each use case), <b>operation contracts</b> (preconditions and postconditions for each operation), and <b>activity diagrams</b> (flowcharts showing the sequence of activities).</p><div class="learn-example"><b>MSG Foundation OO Analysis Case Study:</b><br>The MSG (Muller, Schiller, Geldenhuys) Foundation manages mortgages and investments. The OOA identifies:<br><br><b>Entity Classes:</b><br>Mortgage — represents a home mortgage held by the foundation (amount, interest rate, monthly payment)<br>Investment — represents an investment the foundation holds (type, balance, return rate)<br>MsgApplication — a mortgage application from a borrower (borrower name, income, requested amount)<br><br><b>Boundary Classes:</b><br>User interface screens for data entry and report viewing<br>Report generators for weekly/monthly outputs<br><br><b>Control Classes:</b><br>MortgageManager — coordinates mortgage-related operations<br>FundEstimator — coordinates estimation of available funds</div><div class="learn-def"><b>Key Relationships:</b><br>Mortgage has-a Borrower (association)<br>Foundation manages-many Mortgages (one-to-many association)<br>Foundation holds-many Investments (one-to-many association)</div><p><b>Key operations identified during OOA:</b></p><table class="learn-table"><tr><th>Operation</th><th>Responsible Class</th><th>Description</th></tr><tr><td>estimate_funds_available()</td><td>FundEstimator</td><td>Calculate total funds from investments minus mortgage commitments</td></tr><tr><td>calculate_monthly_payment()</td><td>Mortgage</td><td>Compute P&amp;I payment (e.g., $629.30/month)</td></tr><tr><td>process_weekly_transactions()</td><td>MortgageManager</td><td>Handle incoming payments, escrow disbursements</td></tr><tr><td>check_borrowing_limit()</td><td>MsgApplication</td><td>Verify applicant\'s income meets 28% ratio requirement</td></tr></table><div class="learn-warn"><b>MSG Foundation details:</b> Mortgages include principal &amp; interest (P&amp;I = $629.30/month for a typical mortgage), insurance premiums, escrow accounts for real estate taxes. Borrowing limits use the 28% rule (monthly mortgage payment cannot exceed 28% of gross monthly income). Closing costs are approximately $7,000 with 2 points charged on the mortgage.</div>'

      {
        title: 'Design Concepts & Abstraction',
        body: '<p><b>Design</b> is the phase that bridges analysis ("what to build") and implementation ("building it"). It answers the question: <b>HOW</b> will the system be constructed to satisfy the requirements and analysis models?</p><div class="learn-def"><b>Abstraction:</b> The fundamental tool of design — focusing on essential features while hiding unnecessary details. There are three types:<br><b>Procedural abstraction:</b> A function name hides its implementation (e.g., calling sort() without knowing the algorithm)<br><b>Data abstraction:</b> A class hides its data structure (e.g., using a Stack without knowing if it is array-based or linked-list-based)<br><b>Control abstraction:</b> Loops and conditionals hide execution details (e.g., for-each hides the iteration mechanism)</div><p>There are <b>two major categories</b> of design approaches:</p><table class="learn-table"><tr><th>Approach</th><th>Focus</th><th>Techniques</th><th>Era</th></tr><tr><td><b>Operation-Oriented</b></td><td>Structure around functions/operations</td><td>Data Flow Analysis, Transaction Analysis, Structured Design</td><td>Classical (1970s-80s)</td></tr><tr><td><b>Object-Oriented</b></td><td>Structure around objects and interactions</td><td>OOD with class diagrams, statecharts, PDL</td><td>Modern (1990s-present)</td></tr></table><div class="learn-def"><b>Design inputs:</b> Analysis model (class diagrams, use cases, statecharts, DFDs)<br><b>Design outputs:</b> Detailed class diagram with all methods and attributes, system architecture, interface specifications, algorithm specifications (pseudocode/PDL)</div><div class="learn-warn"><b>Key insight:</b> Good design minimizes complexity. The goal is a system where each component is understandable in isolation, components interact through clean interfaces, and changes to one component do not cascade through the entire system. This is achieved through high cohesion, low coupling, and information hiding.</div>'

      {
        title: 'Data Flow Analysis (DFA)',
        body: '<p><b>Data Flow Analysis</b> is a classical, operation-oriented design technique that transforms Data Flow Diagrams (DFDs) from the analysis phase into a hierarchical module structure called a <b>structure chart</b>.</p><div class="learn-def"><b>Core idea:</b> The flow of data through the system determines the program\'s structure. DFA identifies how data enters the system, gets transformed, and exits — then organizes modules around these flows.</div><p>There are <b>two types of data flow</b> that determine which analysis technique to use:</p><table class="learn-table"><tr><th>Flow Type</th><th>Pattern</th><th>Description</th><th>Example</th></tr><tr><td><b>Transform flow</b></td><td>Input → Transform → Output</td><td>Data enters, gets processed/changed, and exits. The most common pattern.</td><td>Read sensor data → Calculate average → Display result</td></tr><tr><td><b>Transaction flow</b></td><td>Input → Route to handler</td><td>Input determines which of several processing paths to take.</td><td>ATM: user chooses deposit, withdrawal, or balance inquiry</td></tr></table><div class="learn-def"><b>Transform Analysis Steps:</b><br><b>Step 1:</b> Find the <b>central transform</b> — the process that does the main work (the "heart" of the transformation)<br><b>Step 2:</b> Identify <b>afferent</b> (input) branches — processes that gather and prepare data for the central transform<br><b>Step 3:</b> Identify <b>efferent</b> (output) branches — processes that take results from the central transform and deliver them<br><b>Step 4:</b> Factor the DFD into a <b>structure chart</b> with three levels: input modules (afferent), transform module (central), output modules (efferent)<br><b>Step 5:</b> Refine the structure chart — check cohesion and coupling of each module, restructure as needed</div><div class="learn-warn"><b>Important:</b> DFA produces a <b>first-cut design</b> — an initial structure that must be reviewed and improved. It is a starting point, not the final architecture. The first-cut typically needs refinement for better cohesion, reduced coupling, and practical implementation concerns.</div>'

      {
        title: 'Transaction Analysis',
        body: '<p><b>Transaction analysis</b> applies when a system processes <b>different types of transactions</b>, each requiring different handling. Instead of one monolithic process, the design routes each transaction type to its own specialized handler.</p><div class="learn-def"><b>Transaction center:</b> The module that determines the type of incoming transaction and dispatches it to the appropriate handler. It acts as a router, not a processor.</div><div class="learn-example"><b>ATM Example — The Problem:</b><br>A naive DFA design for an ATM might create a single module that handles ALL transaction types, using a control flag to select behavior. This results in <b>logical cohesion</b> (multiple related operations selected by flag) and <b>control coupling</b> (the flag parameter). Both are design smells.</div><div class="learn-def"><b>Transaction Analysis Steps:</b><br><b>Step 1:</b> Identify the <b>transaction center</b> — where the transaction type is determined<br><b>Step 2:</b> Create a <b>separate module for each transaction type</b> — deposit handler, withdrawal handler, transfer handler, balance inquiry handler<br><b>Step 3:</b> Factor out <b>generic modules</b> shared across handlers:<br>Generic edit module: Validates input regardless of transaction type (data validation)<br>Generic update module: Applies changes regardless of transaction type (database update)</div><div class="learn-example"><b>Corrected ATM Design:</b><br>Transaction Center (router)<br>|-- Deposit Handler (functional cohesion)<br>|&nbsp;&nbsp;&nbsp;&nbsp;|-- Generic Edit Module<br>|&nbsp;&nbsp;&nbsp;&nbsp;|-- Generic Update Module<br>|-- Withdrawal Handler (functional cohesion)<br>|&nbsp;&nbsp;&nbsp;&nbsp;|-- Generic Edit Module<br>|&nbsp;&nbsp;&nbsp;&nbsp;|-- Generic Update Module<br>|-- Transfer Handler (functional cohesion)<br>|&nbsp;&nbsp;&nbsp;&nbsp;|-- Generic Edit Module<br>|&nbsp;&nbsp;&nbsp;&nbsp;|-- Generic Update Module<br>|-- Balance Inquiry Handler (functional cohesion)</div><div class="learn-warn"><b>Benefits:</b> Each handler has <b>high cohesion</b> (does one thing well). Coupling between handlers is <b>minimized</b> (they do not depend on each other). Adding a new transaction type means adding a new handler module — no existing code needs to change (Open/Closed Principle). The generic edit/update modules promote <b>reuse</b> across handlers.</div>'

        body: '<p><b>Data-oriented design</b> is a historical approach where the structure of the program is derived directly from the structure of its input and output data.</p><div class="learn-def"><b>Data-Oriented Design Methods:</b><br><b>Jackson System Development (JSD, 1975):</b> Michael Jackson\'s method — analyze the structure of input and output data (sequences, selections, iterations), then derive the program structure to match. If input has a repeating group, the program has a corresponding loop.<br><b>Warnier method:</b> Similar to Jackson but uses different notation (Warnier-Orr diagrams with braces)<br><b>Orr method:</b> Extension of Warnier, adds more formal data analysis</div><div class="learn-warn"><b>Historical note:</b> Data-oriented design has fallen out of fashion with the rise of OOD. However, the underlying principle — that <b>data structure influences program structure</b> — remains valid. OO design implicitly uses this principle: classes are structured around the data they encapsulate.</div><p><b>Object-Oriented Design (OOD)</b> is the modern approach, taking the OO analysis model and adding implementation details:</p><div class="learn-def"><b>Two Major Steps of OOD:</b><br><b>Step 1 — Complete the class diagram:</b> Add ALL attributes with types, ALL methods with signatures and return types, visibility modifiers (public/private/protected), and remaining relationships (associations, dependencies, compositions). The analysis class diagram (conceptual) becomes a design class diagram (implementation-ready).<br><br><b>Step 2 — Detailed design:</b> Specify the algorithm for each method using <b>pseudocode/PDL</b> (Program Design Language). PDL is derived from statecharts — each state transition in the statechart becomes a conditional or loop in the pseudocode. This bridges the gap between design and implementation.</div><div class="learn-example"><b>From Analysis to Design:</b><br>Analysis class: Elevator (attributes: currentFloor, direction)<br>Design class: Elevator (attributes: currentFloor: int, direction: Direction, doorState: DoorState, speed: float; methods: moveUp(): void, moveDown(): void, stop(): void, openDoors(): void, closeDoors(): void, getCurrentFloor(): int; visibility: all methods public, all attributes private)</div>'

k the Door object to open() — the Door handles its own state transitions and motor activation internally.<br><br>This aligns with information hiding (Principle A) and encapsulation. The calling code does not need to know HOW the door opens — it just asks.</div><div class="learn-warn"><b>How the three principles work together:</b><br>Principle A says: hide the secret → reduces coupling<br>Principle B says: put shared logic in one place → reduces duplication<br>Principle C says: let objects manage themselves → increases cohesion<br>Together, they produce designs with <b>high cohesion, low coupling, and minimal duplication</b> — the hallmarks of good OO design.</div>'

bsp;&nbsp;&nbsp;&nbsp;&nbsp;set state to DOORS_OPEN, start_timer()<br><br>The PDL is derived directly from the statechart — each CASE corresponds to a state, each IF to a transition.</div><div class="learn-example"><b>MSG Foundation — Design Class Diagram (Figure 14.14):</b><br><b>Mortgage class attributes:</b> mortgage_amount: float, interest_rate: float, monthly_payment: float, escrow_balance: float, borrower_name: String<br><b>Investment class attributes:</b> investment_type: String, balance: float, return_rate: float<br><b>MsgApplication class attributes:</b> borrower_name: String, annual_income: float, requested_amount: float<br><br><b>Method assignment follows Principles A, B, C:</b><br>calculate_monthly_payment() → <b>Mortgage class</b> (Principle C: mortgage manages its own calculation — P&amp;I = $629.30/month)<br>estimate_funds_available() → <b>Foundation class</b> (uses data from Investment and Mortgage objects)<br>check_borrowing_limit() → <b>MsgApplication class</b> (checks if income meets 28% ratio — the application knows the borrower\'s income)<br>process_escrow() → <b>Mortgage class</b> (manages its own escrow account for insurance and taxes)</div><div class="learn-warn"><b>Key design takeaway:</b> The progression from analysis to design is about adding <b>precision</b>: analysis identifies WHAT classes and relationships exist; design specifies exactly WHAT methods each class has, WHAT algorithms those methods use (via PDL), and HOW objects communicate. The design class diagram is the blueprint from which code is written.</div>'

tr><tr><td><b>Short, focused functions</b></td><td>One responsibility per function/method</td><td>Easier to test, debug, reuse, and understand</td></tr></table><div class="learn-warn"><b>Key insight:</b> The cost of a programming language choice extends far beyond the initial development — it affects maintenance (67%+ of total cost), hiring (availability of developers), and the system\'s lifetime. A "fast" language choice that saves time now may cost enormously in maintenance later.</div>'

ct methods</b></td><td>Move nested blocks into separate functions</td><td>processValid(data) instead of inline nesting</td></tr><tr><td><b>Polymorphism</b></td><td>Use OO dispatch instead of conditionals</td><td>shape.draw() instead of if/else on type</td></tr></table><div class="learn-def"><b>Module size guideline:</b> 35-50 statements per module/method is a good target. This is large enough to do meaningful work but small enough to understand at a glance. However, this must be a <b>guideline</b>, not a rigid rule — see Programming Standards section.</div>'

 exception mechanism:</b><br>Good standards REQUIRE a <b>team leader or lead developer who can grant exceptions</b>. The rule should be: "You must follow the standard <b>unless you get approval from the team lead to deviate</b>."<br><br>This prevents two extremes:<br><b>Rigidity</b> (no exceptions ever) — leads to worse code<br><b>Chaos</b> (everyone does their own thing) — defeats the purpose of standards<br><br>The team lead\'s job is to judge when a deviation genuinely improves the code versus when a developer is just being lazy or idiosyncratic.</div><p><b>Common standard categories:</b> Naming conventions (variables, functions, classes), indentation and formatting, maximum line length, comment requirements, file and directory organization, error handling patterns, logging conventions.</p>'

sted</b> — they are temporary placeholders that are naturally replaced<br>Disadvantage: Low-level modules (often the most complex, reusable components) are tested last<br>Disadvantage: <b>Logic artifacts</b> — stubs may oversimplify behavior, masking real issues</div><div class="learn-def"><b>Bottom-up integration in detail:</b><br>Start with the <b>lowest-level modules</b> (e.g., utility functions, data access)<br>Add higher-level modules one at a time, using <b>drivers</b> to call lower modules<br>Advantage: Reusable, foundational modules are <b>tested early and thoroughly</b><br>Disadvantage: High-level design and integration flaws are <b>discovered last</b> — potentially causing major late rework<br>Disadvantage: The overall system behavior is not visible until late in integration</div>'

var MOCK_EXAM_POOL = [];
var mockExamIndex = 0;
var mockExamScore = 0;
var mockExamAnswers = [];
var mockExamStartTime = null;

function shuffleArray(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function startMockExam() {
  // Shuffle and select 25 questions, keeping chapter balance
  var byChapter = {};
  MOCK_EXAM_QUESTIONS.forEach(function(q) {
    if (!byChapter[q.chapter]) byChapter[q.chapter] = [];
    byChapter[q.chapter].push(q);
  });
  // Shuffle each chapter's pool, then pick proportionally: Ch7=6, Ch8=7, Ch14=6, Ch15=6
  var targets = {"Ch 7": 6, "Ch 8": 7, "Ch 14": 6, "Ch 15": 6};
  var selected = [];
  Object.keys(targets).forEach(function(ch) {
    var pool = shuffleArray(byChapter[ch] || []);
    selected = selected.concat(pool.slice(0, targets[ch]));
  });
  MOCK_EXAM_POOL = shuffleArray(selected);

  mockExamIndex = 0;
  mockExamScore = 0;
  mockExamAnswers = new Array(MOCK_EXAM_POOL.length).fill(-1);
  mockExamStartTime = new Date();
  showView("mockExamView");
  renderMockExamQuestion();
}

function renderMockExamQuestion() {
  var question = MOCK_EXAM_POOL[mockExamIndex];
  var h = '';
  
  h += '<div style="margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;">';
  h += '<div><span class="badge" style="background:#ec489922;color:#ec4899;border:1px solid #ec489944;">Exam 2</span></div>';
  h += '<div style="font-size:14px;color:#94a3b8;">Question ' + (mockExamIndex + 1) + ' of ' + MOCK_EXAM_POOL.length + '</div>';
  h += '</div>';
  
  h += '<div class="progress-track" style="margin-bottom:20px;"><div class="progress-fill" style="width:' + ((mockExamIndex + 1) / MOCK_EXAM_POOL.length * 100) + '%;background:#7c3aed;"></div></div>';
  
  h += '<div class="card-box">';
  h += '<div class="card-label">QUESTION</div>';
  h += '<div class="card-text">' + esc(question.q) + '</div>';
  h += '</div>';
  
  h += '<div style="margin-top:20px;">';
  question.options.forEach(function(opt, idx) {
    var isSelected = mockExamAnswers[mockExamIndex] === idx;
    var isCorrect = (idx === question.correct);
    var className = 'quiz-option';
    if (mockExamAnswers[mockExamIndex] !== -1) {
      if (isCorrect) className += ' correct';
      else if (isSelected) className += ' wrong';
    }
    h += '<button class="' + className + '" onclick="selectMockExamAnswer(' + idx + ')">';
    h += '<span style="display:block;">' + esc(opt) + '</span>';
    h += '</button>';
  });
  h += '</div>';
  
  h += '<div style="display:flex;gap:12px;margin-top:24px;">';
  if (mockExamIndex > 0) {
    h += '<button class="learn-nav-btn learn-nav-prev" style="flex:1;" onclick="mockExamPrev()">\u2190 Previous</button>';
  } else {
    h += '<button class="learn-nav-btn learn-nav-prev" style="flex:1;" onclick="goHome()">\u2190 Back</button>';
  }
  if (mockExamIndex < MOCK_EXAM_POOL.length - 1) {
    h += '<button class="learn-nav-btn learn-nav-next" style="flex:1;" onclick="mockExamNext()">Next \u2192</button>';
  } else {
    h += '<button class="learn-nav-btn learn-nav-next" style="flex:1;" onclick="finalizeMockExam()">Submit Exam \u2192</button>';
  }
  h += '</div>';
  
  document.getElementById("mockExamView").innerHTML = h;
  window.scrollTo(0, 0);
}

function selectMockExamAnswer(idx) {
  if (mockExamAnswers[mockExamIndex] === -1) {
    mockExamAnswers[mockExamIndex] = idx;
    if (idx === MOCK_EXAM_POOL[mockExamIndex].correct) {
      mockExamScore++;
    }
    renderMockExamQuestion();
  }
}

function mockExamNext() {
  mockExamIndex++;
  renderMockExamQuestion();
}

function mockExamPrev() {
  mockExamIndex--;
  renderMockExamQuestion();
}

function finalizeMockExam() {
  var totalQuestions = MOCK_EXAM_POOL.length;
  var percentage = Math.round((mockExamScore / totalQuestions) * 100);
  var timeElapsed = Math.round((new Date() - mockExamStartTime) / 1000 / 60);
  
  var h = '';
  h += '<div style="text-align:center;margin:40px 0;">';
  h += '<div style="font-size:48px;font-weight:700;color:#7c3aed;margin-bottom:10px;">' + mockExamScore + ' / ' + totalQuestions + '</div>';
  h += '<div style="font-size:24px;font-weight:600;color:#f1f5f9;margin-bottom:20px;">' + percentage + '%</div>';
  h += '<div style="font-size:14px;color:#94a3b8;margin-bottom:30px;">Time: ' + timeElapsed + ' minutes</div>';
  
  if (percentage >= 80) {
    h += '<div class="learn-def" style="background:rgba(52,211,153,.13);border-color:rgba(52,211,153,.27);">';
    h += '<b style="color:#34d399;">Excellent Performance!</b><br>You demonstrated a strong understanding of the material.';
    h += '</div>';
  } else if (percentage >= 60) {
    h += '<div class="learn-def" style="background:rgba(251,191,36,.13);border-color:rgba(251,191,36,.27);">';
    h += '<b style="color:#fbbf24;">Good Work!</b><br>You have a solid grasp of the concepts. Review the missed questions for deeper understanding.';
    h += '</div>';
  } else {
    h += '<div class="learn-def" style="background:rgba(248,113,113,.13);border-color:rgba(248,113,113,.27);">';
    h += '<b style="color:#f87171;">Keep Studying</b><br>Review the course material, especially the topics you found challenging.';
    h += '</div>';
  }
  
  h += '<div style="margin-top:30px;"><button class="reveal-btn" onclick="goHome()">Back to Home</button></div>';
  h += '</div>';
  
  document.getElementById("mockExamView").innerHTML = h;
  window.scrollTo(0, 0);
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function esc(s) {
  var d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function getFiltered() {
  if (currentTopic === "All") return ALL_CARDS;
  return ALL_CARDS.filter(function(c) { return c.topic === currentTopic; });
}

function getQuizPool() {
  return ALL_CARDS.filter(function(c) { return quizChapters[c.ch]; });
}

function showView(name) {
  ["homeView","studyView","quizSetupView","quizView","browseView","learnView","mockExamView"].forEach(function(v) {
    document.getElementById(v).classList.add("hidden");
  });
  document.getElementById(name).classList.remove("hidden");
  document.getElementById("backBtn").style.display = (name === "homeView") ? "none" : "block";
}

function renderTopicBar() {
  var h = '<button class="topic-btn' + (currentTopic === "All" ? " active" : "") + '" onclick="setTopic(\'All\')">All Chapters</button>';
  TOPICS.forEach(function(t) {
    var active = currentTopic === t;
    var bg = active ? "background:" + TOPIC_COLORS[t] + ";color:#fff;border-color:" + TOPIC_COLORS[t] : "";
    h += '<button class="topic-btn" style="' + bg + '" onclick="setTopic(\'' + t.replace(/'/g, "\\'") + '\')">' + esc(t) + '</button>';
  });
  document.getElementById("topicBar").innerHTML = h;
}

function renderStats() {
  var cards = getFiltered();
  var boxes = [0,0,0,0,0];
  cards.forEach(function(c) { boxes[Math.min(srs[c.id].box, 4)]++; });
  var total = cards.length;
  var mastered = boxes[3] + boxes[4];
  var pct = total > 0 ? Math.round((mastered / total) * 100) : 0;

  var h = '<h3 style="color:#f1f5f9;margin:0 0 16px 0;font-size:18px;">Your Progress</h3>';
  h += '<div class="stats-pct">' + pct + '%</div>';
  h += '<div class="stats-sub">Mastery (' + mastered + '/' + total + ' cards)</div>';
  for (var i = 0; i < 5; i++) {
    var w = total > 0 ? (boxes[i] / total * 100) : 0;
    h += '<div class="stats-row">';
    h += '<span class="stats-label" style="color:' + STATS_COLORS[i] + '">' + STATS_LABELS[i] + '</span>';
    h += '<div style="flex:1"><div class="progress-track"><div class="progress-fill" style="width:' + w + '%;background:' + STATS_COLORS[i] + '"></div></div></div>';
    h += '<span class="stats-num">' + boxes[i] + '</span>';
    h += '</div>';
  }
  document.getElementById("statsBox").innerHTML = h;
}

function renderTopicGrid() {
  var h = '';
  TOPICS.forEach(function(t) {
    var count = ALL_CARDS.filter(function(c) { return c.topic === t; }).length;
    var mast = ALL_CARDS.filter(function(c) { return c.topic === t && srs[c.id].box >= 3; }).length;
    h += '<div class="topic-card" style="border-left-color:' + TOPIC_COLORS[t] + '" onclick="setTopic(\'' + t.replace(/'/g, "\\'") + '\')">';
    h += '<div style="font-size:13px;font-weight:600;color:' + TOPIC_COLORS[t] + ';margin-bottom:4px;">' + esc(t) + '</div>';
    h += '<div style="font-size:12px;color:#94a3b8;">' + mast + '/' + count + ' mastered</div>';
    h += '</div>';
  });
  document.getElementById("topicGrid").innerHTML = h;
}

function renderHome() {
  renderTopicBar();
  renderStats();
  renderTopicGrid();
  var banner = document.getElementById("sessionBanner");
  if (sessionStats.reviewed > 0) {
    var pct = Math.round((sessionStats.correct / sessionStats.reviewed) * 100);
    banner.textContent = "Session complete! Reviewed " + sessionStats.reviewed + " cards \u2014 " + sessionStats.correct + " correct (" + pct + "%)";
    banner.classList.remove("hidden");
  } else {
    banner.classList.add("hidden");
  }
  showView("homeView");
}

  deck = pool.slice().sort(function(a, b) {
    if (srs[a.id].box !== srs[b.id].box) return srs[a.id].box - srs[b.id].box;
    return srs[a.id].lastSeen - srs[b.id].lastSeen;
  });
  deckIndex = 0;
  answerRevealed = false;
  sessionStats = { reviewed: 0, correct: 0 };
  renderStudyCard();
  showView("studyView");
}

function renderStudyCard() {
  if (deckIndex >= deck.length) { goHome(); return; }
  var card = deck[deckIndex];
  var tc = TOPIC_COLORS[card.topic] || "#818cf8";
  var pctW = ((deckIndex + 1) / deck.length * 100);

  var h = '<div style="max-width:680px;margin:0 auto;">';
  h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">';
  h += '<span style="color:#94a3b8;font-size:14px;">Card ' + (deckIndex+1) + ' of ' + deck.length + '</span>';
  h += '<span class="badge" style="background:' + tc + '22;color:' + tc + ';border:1px solid ' + tc + '44;">' + esc(card.topic) + '</span>';
  h += '</div>';
  h += '<div class="progress-track"><div class="progress-fill" style="width:' + pctW + '%;background:#818cf8;"></div></div>';
  h += '<div class="card-box"><div class="card-label">Question</div><div class="card-text">' + esc(card.q) + '</div></div>';

  if (!answerRevealed) {
    h += '<button class="reveal-btn" onclick="revealAnswer()">Reveal Answer</button>';
  } else {
    h += '<div class="answer-box"><div class="answer-label">Answer</div><div class="answer-text">' + esc(card.a) + '</div></div>';
    h += '<div class="how-well">How well did you know this?</div>';
    h += '<div class="rate-row">';
    h += '<button class="rate-btn rate-0" onclick="rateCard(0)">\ud83d\ude13 Didn\'t Know</button>';
    h += '<button class="rate-btn rate-1" onclick="rateCard(1)">\ud83e\udd14 Partially</button>';
    h += '<button class="rate-btn rate-2" onclick="rateCard(2)">\ud83d\udcaa Knew It!</button>';
    h += '</div>';
  }
  h += '</div>';
  document.getElementById("studyView").innerHTML = h;
}

function revealAnswer() {
  answerRevealed = true;
  renderStudyCard();
}

function rateCard(rating) {
  var card = deck[deckIndex];
  var cur = srs[card.id];
  if (rating === 2) cur.box = Math.min(cur.box + 1, 4);
  else if (rating === 1) cur.box = Math.max(cur.box, 1);
  else cur.box = 0;
  cur.lastSeen = Date.now();
  sessionStats.reviewed++;
  if (rating === 2) sessionStats.correct++;
  deckIndex++;
  answerRevealed = false;
  if (deckIndex >= deck.length) { goHome(); return; }
  renderStudyCard();
}

// ═══════════════════════════════════════════════════════════════════
// QUIZ MODE — Chapter Selection + Adaptive Quiz
// ═══════════════════════════════════════════════════════════════════
function showQuizSetup() {
  var h = '<div class="ch-select">';
  h += '<h3>Select Chapters for Quiz</h3>';
  h += '<div style="display:flex;gap:8px;margin-bottom:16px;">';
  h += '<button style="padding:8px 16px;background:#818cf8;color:#fff;border-radius:8px;font-size:13px;font-weight:600;" onclick="quizSelectAll()">Select All</button>';
  h += '<button style="padding:8px 16px;background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:8px;font-size:13px;font-weight:600;" onclick="quizSelectNone()">Clear All</button>';
  h += '</div>';
  h += '<div class="ch-grid">';
  CHAPTERS.forEach(function(ch) {
    var count = ALL_CARDS.filter(function(c) { return c.ch === ch; }).length;
    var checked = quizChapters[ch] ? " checked" : "";
    var label = ch;
    // Get short label
    if (ch === "Ch 1") label = "Ch 1: Intro to SE";
    else if (ch === "Ch 7") label = "Ch 7: Modules";
    else if (ch === "Ch 8") label = "Ch 8: Reuse";
    else if (ch === "Ch 10") label = "Ch 10: Unified Process";
    else if (ch === "Ch 11") label = "Ch 11: Requirements";
    else if (ch === "Ch 12") label = "Ch 12: Analysis";
    else if (ch === "Ch 13") label = "Ch 13: OO Analysis";
    else if (ch === "Ch 14") label = "Ch 14: Design";
    else if (ch === "Ch 15") label = "Ch 15: Implementation";
    h += '<label class="ch-check' + checked + '" onclick="toggleChapter(\'' + ch + '\', this)">';
    h += '<div class="ch-indicator">' + (quizChapters[ch] ? "&#10003;" : "") + '</div>';
    h += '<div><div style="font-weight:600;color:' + (quizChapters[ch] ? "#f1f5f9" : "#94a3b8") + ';">' + label + '</div>';
    h += '<div style="font-size:12px;color:#64748b;">' + count + ' cards</div></div>';
    h += '</label>';
  });
  h += '</div>';
  var poolCount = getQuizPool().length;
  h += '<div style="color:#94a3b8;font-size:14px;margin:12px 0;">' + poolCount + ' cards selected — quiz will have ' + Math.min(20, poolCount) + ' questions</div>';
  h += '<button class="quiz-start-btn" onclick="startQuiz()"' + (poolCount < 4 ? ' disabled' : '') + '>Start Quiz</button>';
  if (poolCount < 4) {
    h += '<div style="color:#f87171;font-size:13px;margin-top:8px;">Select at least 4 cards (need options for multiple choice)</div>';
  }
  h += '</div>';
  document.getElementById("quizSetupView").innerHTML = h;
  showView("quizSetupView");
}

function toggleChapter(ch, el) {
  quizChapters[ch] = !quizChapters[ch];
  showQuizSetup();
}

function quizSelectAll() {
  CHAPTERS.forEach(function(ch) { quizChapters[ch] = true; });
  showQuizSetup();
}

function quizSelectNone() {
  CHAPTERS.forEach(function(ch) { quizChapters[ch] = false; });
  showQuizSetup();
}

function startQuiz() {
  var pool = getQuizPool();
  if (pool.length < 4) return;
  var QUIZ_SIZE = 20;
  var weak = [];
  var mid = [];
  var strong = [];
  pool.forEach(function(c) {
    var box = srs[c.id] ? srs[c.id].box : 0;
    if (box <= 1) weak.push(c);
    else if (box === 2) mid.push(c);
    else strong.push(c);
  });
  var weakTarget = Math.ceil(QUIZ_SIZE * 0.5);
  var midTarget = Math.ceil(QUIZ_SIZE * 0.3);
  var picked = [];
  shuffle(weak).forEach(function(c) { if (picked.length < weakTarget) picked.push(c); });
  shuffle(mid).forEach(function(c) { if (picked.length < weakTarget + midTarget) picked.push(c); });
  shuffle(strong).forEach(function(c) { if (picked.length < QUIZ_SIZE) picked.push(c); });
  if (picked.length < QUIZ_SIZE) {
    var pickedIds = {};
    picked.forEach(function(c) { pickedIds[c.id] = true; });
    shuffle(pool).forEach(function(c) {
      if (picked.length < QUIZ_SIZE && !pickedIds[c.id]) picked.push(c);
    });
  }
  picked = shuffle(picked).slice(0, Math.min(QUIZ_SIZE, pool.length));
  quizCards = picked.map(function(card) {
    var others = shuffle(pool.filter(function(c) { return c.id !== card.id; })).slice(0, 3);
    var options = shuffle([
      { text: card.a, correct: true }
    ].concat(others.map(function(o) { return { text: o.a, correct: false }; })));
    return { q: card.q, topic: card.topic, cardId: card.id, options: options };
  });
  quizIndex = 0;
  quizScore = 0;
  quizSelected = null;
  renderQuiz();
  showView("quizView");
}

function renderQuiz() {
  var el = document.getElementById("quizView");
  if (quizIndex >= quizCards.length) {
    var emoji = quizScore >= quizCards.length * 0.8 ? "\ud83c\udf89" : quizScore >= quizCards.length * 0.5 ? "\ud83d\udc4d" : "\ud83d\udcda";
    var msg = quizScore >= quizCards.length * 0.8 ? "Excellent work! You're well prepared." : quizScore >= quizCards.length * 0.5 ? "Good effort! Review the topics you missed." : "Keep studying \u2014 focus on the chapters you missed.";
    var col = quizScore >= quizCards.length * 0.8 ? "#34d399" : "#fbbf24";
    el.innerHTML = '<div style="text-align:center;padding:40px;">' +
      '<div style="font-size:64px;margin-bottom:16px;">' + emoji + '</div>' +
      '<h2 style="color:#f1f5f9;margin-bottom:8px;">Quiz Complete!</h2>' +
      '<div style="font-size:36px;font-weight:700;color:' + col + ';">' + quizScore + ' / ' + quizCards.length + '</div>' +
      '<div style="color:#94a3b8;margin:12px 0 24px;">' + msg + '</div>' +
      '<button style="padding:14px 32px;background:#818cf8;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;" onclick="goHome()">Back to Study</button>' +
      '</div>';
    return;
  }

  var card = quizCards[quizIndex];
  var tc = TOPIC_COLORS[card.topic] || "#818cf8";
  var pctW = ((quizIndex + 1) / quizCards.length * 100);

  var h = '<div style="max-width:700px;margin:0 auto;">';
  h += '<div style="display:flex;justify-content:space-between;margin-bottom:12px;">';
  h += '<span style="color:#94a3b8;font-size:14px;">Question ' + (quizIndex+1) + '/' + quizCards.length + '</span>';
  h += '<span style="color:#34d399;font-size:14px;font-weight:600;">Score: ' + quizScore + '</span>';
  h += '</div>';
  h += '<div class="progress-track"><div class="progress-fill" style="width:' + pctW + '%;background:#818cf8;"></div></div>';
  h += '<div style="background:#1e293b;border-radius:16px;padding:28px 24px;margin-top:16px;border:1px solid #334155;">';
  h += '<span class="badge" style="background:' + tc + '22;color:' + tc + ';border:1px solid ' + tc + '44;">' + esc(card.topic) + '</span>';
  h += '<div style="font-size:18px;color:#f1f5f9;line-height:1.6;margin-top:12px;">' + esc(card.q) + '</div>';
  h += '</div>';
  h += '<div style="display:flex;flex-direction:column;gap:10px;margin-top:16px;">';

  card.options.forEach(function(opt, i) {
    var cls = "quiz-option";
    var cursor = "pointer";
    if (quizSelected !== null) {
      cursor = "default";
      if (opt.correct) cls += " correct";
      else if (i === quizSelected && !opt.correct) cls += " wrong";
    }
    var display = esc(opt.text);
    h += '<button class="' + cls + '" style="cursor:' + cursor + ';" onclick="quizPick(' + i + ')">';
    h += '<span style="font-weight:600;margin-right:8px;color:#64748b;">' + String.fromCharCode(65 + i) + '.</span>';
    h += display;
    h += '</button>';
  });

  h += '</div></div>';
  el.innerHTML = h;
}

function quizPick(i) {
  if (quizSelected !== null) return;
  quizSelected = i;
  var card = quizCards[quizIndex];
  var correct = card.options[i].correct;
  if (correct) {
    quizScore++;
    // Boost SRS for correct quiz answer
    if (srs[card.cardId]) srs[card.cardId].box = Math.min(srs[card.cardId].box + 1, 4);
  } else {
    // Demote SRS for wrong quiz answer
    if (srs[card.cardId]) srs[card.cardId].box = Math.max(srs[card.cardId].box - 1, 0);
  }
  renderQuiz();
  setTimeout(function() {
    quizIndex++;
    quizSelected = null;
    renderQuiz();
  }, 1500);
}

// ═══════════════════════════════════════════════════════════════════
// BROWSE MODE
// ═══════════════════════════════════════════════════════════════════
var browseExpanded = null;

function startBrowse() {
  renderBrowse();
  showView("browseView");
}

function renderBrowse() {
  var cards = getFiltered();
  var grouped = {};
  cards.forEach(function(c) { if (!grouped[c.topic]) grouped[c.topic] = []; grouped[c.topic].push(c); });

  var h = '<div id="browseTopics" class="topic-bar"></div>';
  h += '<p style="color:#94a3b8;margin-bottom:20px;font-size:14px;">Click any card to reveal the answer. ' + cards.length + ' cards shown.</p>';

  Object.keys(grouped).forEach(function(topic) {
    var tcards = grouped[topic];
    h += '<div style="margin-bottom:28px;">';
    h += '<h3 style="color:' + (TOPIC_COLORS[topic] || "#818cf8") + ';margin:0 0 12px 0;font-size:16px;">' + esc(topic) + ' (' + tcards.length + ')</h3>';
    tcards.forEach(function(card) {
      h += '<div class="browse-card" onclick="toggleBrowse(' + card.id + ')">';
      h += '<div style="font-size:15px;color:#f1f5f9;line-height:1.5;">' + esc(card.q) + '</div>';
      if (browseExpanded === card.id) {
        h += '<div class="browse-answer">' + esc(card.a) + '</div>';
      }
      h += '</div>';
    });
    h += '</div>';
  });

  document.getElementById("browseView").innerHTML = h;

  var tb = document.getElementById("browseTopics");
  if (tb) {
    var bh = '<button class="topic-btn' + (currentTopic === "All" ? " active" : "") + '" onclick="setTopicBrowse(\'All\')">All Chapters</button>';
    TOPICS.forEach(function(t) {
      var active = currentTopic === t;
      var bg = active ? "background:" + TOPIC_COLORS[t] + ";color:#fff;border-color:" + TOPIC_COLORS[t] : "";
      bh += '<button class="topic-btn" style="' + bg + '" onclick="setTopicBrowse(\'' + t.replace(/'/g, "\\'") + '\')">' + esc(t) + '</button>';
    });
    tb.innerHTML = bh;
  }
}

function toggleBrowse(id) {
  browseExpanded = (browseExpanded === id) ? null : id;
  renderBrowse();
}

function setTopicBrowse(t) {
  currentTopic = t;
  browseExpanded = null;
  renderBrowse();
}

// ═══════════════════════════════════════════════════════════════════
// LEARN MODE
// ═══════════════════════════════════════════════════════════════════
function startLearn() {
  learnTopicIndex = -1;
  renderLearnTOC();
  showView("learnView");
}

function renderLearnTOC() {
  var h = '<h2 style="color:#f1f5f9;margin-bottom:6px;font-size:22px;">Study Guide</h2>';
  h += '<p style="color:#94a3b8;margin-bottom:20px;font-size:14px;">Read through each chapter to understand the concepts before testing yourself with flashcards.</p>';
  LESSONS.forEach(function(lesson, i) {
    var tc = TOPIC_COLORS[lesson.topic] || "#818cf8";
    var numSections = lesson.sections.length;
    h += '<div class="learn-toc-item" onclick="openLesson(' + i + ')">';
    h += '<div class="learn-toc-num" style="background:' + tc + '22;color:' + tc + ';border:1px solid ' + tc + '44;">' + (i + 1) + '</div>';
    h += '<div style="flex:1;"><div style="font-size:16px;font-weight:600;color:' + tc + ';">' + esc(lesson.topic) + '</div>';
    h += '<div style="font-size:13px;color:#94a3b8;margin-top:2px;">' + numSections + ' section' + (numSections > 1 ? 's' : '') + '</div></div>';
    h += '<div style="color:#64748b;font-size:18px;">\u2192</div>';
    h += '</div>';
  });
  document.getElementById("learnView").innerHTML = h;
}

function openLesson(idx) {
  learnTopicIndex = idx;
  learnSectionIndex = 0;
  renderLearnSection();
}

function renderLearnSection() {
  var lesson = LESSONS[learnTopicIndex];
  var section = lesson.sections[learnSectionIndex];
  var tc = TOPIC_COLORS[lesson.topic] || "#818cf8";
  var totalSections = lesson.sections.length;

  var h = '';
  h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;">';
  h += '<span class="badge" style="background:' + tc + '22;color:' + tc + ';border:1px solid ' + tc + '44;">' + esc(lesson.topic) + '</span>';
  h += '<span style="color:#64748b;font-size:13px;">Section ' + (learnSectionIndex + 1) + ' of ' + totalSections + '</span>';
  h += '</div>';
  h += '<div class="progress-track" style="margin-bottom:20px;"><div class="progress-fill" style="width:' + ((learnSectionIndex + 1) / totalSections * 100) + '%;background:' + tc + ';"></div></div>';

  h += '<div class="learn-section">';
  h += '<div class="learn-title" style="color:' + tc + ';">' + esc(section.title) + '</div>';
  h += '<div class="learn-body">' + section.body + '</div>';
  h += '</div>';

  h += '<div class="learn-nav">';
  if (learnSectionIndex > 0) {
    h += '<button class="learn-nav-btn learn-nav-prev" onclick="learnPrev()">\u2190 Previous</button>';
  } else {
    h += '<button class="learn-nav-btn learn-nav-prev" onclick="renderLearnTOC()">\u2190 All Topics</button>';
  }
  if (learnSectionIndex < totalSections - 1) {
    h += '<button class="learn-nav-btn learn-nav-next" onclick="learnNext()">Next \u2192</button>';
  } else {
    var nextLessonIdx = learnTopicIndex + 1;
    if (nextLessonIdx < LESSONS.length) {
      h += '<button class="learn-nav-btn learn-nav-next" onclick="openLesson(' + nextLessonIdx + ')">Next Chapter \u2192</button>';
    } else {
      h += '<button class="learn-nav-btn learn-nav-next" onclick="renderLearnTOC()">Back to Guide</button>';
    }
  }
  h += '</div>';

  document.getElementById("learnView").innerHTML = h;
  window.scrollTo(0, 0);
}

function learnNext() {
  learnSectionIndex++;
  renderLearnSection();
}

function learnPrev() {
  learnSectionIndex--;
  renderLearnSection();
}

// ═══════════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════════
function setTopic(t) {
  currentTopic = t;
  renderHome();
}

function goHome() {
  renderHome();
}

// ═══════════════════════════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════════════════
document.addEventListener("keydown", function(e) {
  if (document.getElementById("studyView").classList.contains("hidden")) return;
  if (e.key === " " || e.key === "Enter") {
    e.preventDefault();
    if (!answerRevealed) revealAnswer();
  }
  if (answerRevealed) {
    if (e.key === "1") rateCard(0);
    if (e.key === "2") rateCard(1);
    if (e.key === "3") rateCard(2);
  }
});

// ═══════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════
renderHome();
</script>
