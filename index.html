<script>
// ═══════════════════════════════════════════════════════════════════
// FLASHCARD DATABASE — CS 3321 Software Engineering
// ═══════════════════════════════════════════════════════════════════
var ALL_CARDS = [
  // ──────────────── Chapter 1: Introduction to SE ────────────────
  {id:1,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"When and where did the term 'Software Engineering' originate?",a:"At a 1968 NATO conference. The term was coined to address the 'software crisis' — the difficulty of writing correct, understandable, and verifiable programs."},
  {id:2,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"What is the textbook definition of Software Engineering?",a:"The production of fault-free software, delivered on time and within budget, that satisfies the client's needs. It also must be easy to modify when needs change."},
  {id:3,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"According to the Standish Group (2020 data), what percentage of software projects are successful, challenged, or cancelled?",a:"35% successful (on time/budget), 46% challenged (late, over budget, or reduced scope), 19% cancelled."},
  {id:4,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"What are the 6 phases of the Waterfall life-cycle model?",a:"1. Requirements\n2. Analysis (Specification)\n3. Design\n4. Implementation\n5. Postdelivery Maintenance\n6. Retirement"},
  {id:5,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"What are the three types of maintenance in software engineering?",a:"1. Corrective — fixing residual faults/bugs\n2. Perfective — adding new functionality requested by client\n3. Adaptive — changes due to new environment (hardware, OS, regulations)"},
  {id:6,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"What is the 'classical' view of maintenance vs. the 'modern' view?",a:"Classical: Development THEN maintenance (maintenance starts after delivery).\nModern: Maintenance is part of the ENTIRE life cycle — every phase involves maintaining/evolving the product."},
  {id:7,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"Why is postdelivery maintenance so expensive?",a:"It consumes the largest portion of total software costs (often >67% of total cost). The code was written by someone else, is hard to understand, and changes can introduce new faults."},
  {id:8,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"What does the economic formula 'CM_new is 10% faster' mean in SE context?",a:"If you develop new methodologies, the cost of maintenance for new code (CM_new) can be reduced — e.g., 10% faster maintenance. Over the life of the product this has huge economic impact since maintenance dominates costs."},
  {id:9,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"What is the difference between a software fault and a software failure?",a:"A fault (bug) is an error in the code. A failure is when the software produces incorrect results or behaves incorrectly during execution. A fault may or may not lead to a failure."},
  {id:10,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"Why is the Requirements phase critical?",a:"Faults introduced during requirements are the most expensive to fix later. If you misunderstand what the client needs, everything built on top of those requirements will be wrong."},

  // ──────────────── Chapter 7: Modules & Cohesion/Coupling ────────────────
  {id:11,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is a module in software engineering?",a:"A lexically contiguous sequence of program statements, bounded by boundary elements, having an aggregate identifier. In short: a named, self-contained unit of code (function, class, file, package)."},
  {id:12,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is the goal of composite/structured design?",a:"Maximize interaction WITHIN modules (high cohesion) and minimize interaction BETWEEN modules (low coupling)."},
  {id:13,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is cohesion? Name all 7 levels from worst to best.",a:"Cohesion = degree to which elements within a module belong together.\n1. Coincidental (worst)\n2. Logical\n3. Temporal\n4. Procedural\n5. Communicational\n6. Functional\n7. Informational (best)"},
  {id:14,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is coincidental cohesion?",a:"A module whose parts are completely unrelated — they are grouped arbitrarily. This is the worst level of cohesion. Example: a 'utilities' module with random functions thrown together."},
  {id:15,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is logical cohesion?",a:"A module that performs a set of related actions, one of which is selected by the calling module. Example: a module that handles all input (keyboard, mouse, file) with a flag to pick which one."},
  {id:16,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is temporal cohesion?",a:"A module whose elements are related by timing — they all happen at the same time. Example: an 'initialization' module that sets up unrelated variables."},
  {id:17,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is procedural cohesion?",a:"A module whose elements are involved in different activities but flow sequentially from one to the next. Example: a module that reads a record, then formats a screen, then validates input."},
  {id:18,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is communicational cohesion?",a:"A module whose elements operate on the same data (same input or same output). Example: a module that finds a customer AND computes their balance using the same customer record."},
  {id:19,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is functional cohesion?",a:"A module that performs exactly ONE well-defined function. Example: 'calculateSquareRoot(x)'. This is the second-best level of cohesion."},
  {id:20,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is informational cohesion?",a:"A module that performs multiple actions on the same data structure (like a class with methods). Each action has its own entry/exit point. This is the BEST level of cohesion."},
  {id:21,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"What is coupling?",a:"The degree of interdependence between modules. Low coupling is desirable — changes in one module should have minimal impact on others."},
  {id:22,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"Name the 5 levels of coupling from best (lowest) to worst (highest).",a:"1. Data coupling (best) — modules share only simple data parameters\n2. Stamp coupling — modules share composite data structures\n3. Control coupling — one module passes a control flag to another\n4. Common coupling — modules share global data\n5. Content coupling (worst) — one module directly modifies another's internal data"},

  // ──────────────── Chapter 8: Reuse & Portability ────────────────
  {id:23,ch:"Ch 8",topic:"Ch 8: Reuse & Portability",q:"What are the two approaches to software reuse?",a:"1. Opportunistic reuse — reuse happens by chance, ad hoc\n2. Systematic reuse — planned, deliberate reuse as part of the development strategy"},
  {id:24,ch:"Ch 8",topic:"Ch 8: Reuse & Portability",q:"What is the NIH syndrome?",a:"'Not Invented Here' syndrome — developers resist reusing code they didn't write themselves, preferring to build from scratch even when reusable components exist."},
  {id:25,ch:"Ch 8",topic:"Ch 8: Reuse & Portability",q:"Name at least 4 impediments to software reuse.",a:"1. NIH syndrome\n2. Cost of making components reusable\n3. Concern about faults in others' code\n4. Difficulty storing and retrieving reusable components\n5. Legal/licensing issues\n6. Cost of COTS (Commercial Off-The-Shelf) components"},
  {id:26,ch:"Ch 8",topic:"Ch 8: Reuse & Portability",q:"What was the Raytheon reuse case study's key results?",a:"Raytheon achieved a 60% reuse rate and 50% increase in productivity. This is a classic success story of systematic reuse."},
  {id:27,ch:"Ch 8",topic:"Ch 8: Reuse & Portability",q:"What caused the Ariane 5 explosion and what does it teach about reuse?",a:"A 64-bit floating-point to 16-bit integer conversion caused an overflow. The code was reused from Ariane 4 without verifying it would work in Ariane 5's different flight profile. Cost: $500 million. Lesson: reused code must be re-validated for the new context."},
  {id:28,ch:"Ch 8",topic:"Ch 8: Reuse & Portability",q:"What is software portability?",a:"The ease with which software can be transferred from one environment (hardware, OS, compiler) to another. Portable software minimizes environment-specific dependencies."},
  {id:29,ch:"Ch 8",topic:"Ch 8: Reuse & Portability",q:"What is COTS software?",a:"Commercial Off-The-Shelf software — pre-built software products purchased and used rather than custom-built. Examples: databases, operating systems, middleware."},

  // ──────────────── Chapter 10: Unified Process & UML ────────────────
  {id:30,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"What is the 'moving target problem' in software development?",a:"Requirements change while the software is being developed. By the time a product is delivered, the client's needs may have evolved, making the software partially obsolete."},
  {id:31,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"What is the difference between iteration and incrementation?",a:"Iteration = reworking/refining an existing artifact (do it again better).\nIncrementation = adding new functionality in small pieces (build it up gradually).\nBoth are used together in modern processes."},
  {id:32,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"What is Miller's Law and how does it apply to SE?",a:"Humans can handle only about 7 chunks of information at a time. In SE, this means we must break complex problems into smaller pieces (stepwise refinement, modular design) to manage complexity."},
  {id:33,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"What is stepwise refinement?",a:"A top-down design technique where you start with a high-level description and progressively break it into more detailed steps until each step is directly implementable."},
  {id:34,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"What is the Unified Process?",a:"A methodology (not a process) for software development. It is adaptable, iterative, and incremental. It uses UML as its modeling language and organizes work into 5 core workflows across 4 phases."},
  {id:35,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"What are the 5 core workflows of the Unified Process?",a:"1. Requirements workflow\n2. Analysis workflow\n3. Design workflow\n4. Implementation workflow\n5. Test workflow"},
  {id:36,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"What are the 4 phases of the Unified Process?",a:"1. Inception — define scope, feasibility\n2. Elaboration — analyze, architect, reduce risk\n3. Construction — build the product iteratively\n4. Transition — deploy to users, beta test"},
  {id:37,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"What is UML?",a:"Unified Modeling Language — a standardized graphical modeling language used to visualize, specify, construct, and document software system artifacts. It is NOT a methodology; it's a notation."},
  {id:38,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"Why is the Unified Process called a 'methodology' rather than a 'process'?",a:"Because it is adaptable — it provides guidelines but must be customized for each project. A fixed process would be the same every time; a methodology is a framework you adapt."},

  // ──────────────── Chapter 11: Requirements ────────────────
  {id:39,ch:"Ch 11",topic:"Ch 11: Requirements",q:"What is the key difference between what a client WANTS and what they NEED?",a:"The requirements workflow determines what the client NEEDS, not just what they want. Clients often don't know exactly what they need, or express desires that don't match their real requirements."},
  {id:40,ch:"Ch 11",topic:"Ch 11: Requirements",q:"What is the difference between requirements elicitation and requirements analysis?",a:"Elicitation = gathering requirements from stakeholders (interviews, observation, etc.)\nAnalysis = organizing, modeling, and refining the gathered requirements into a structured form."},
  {id:41,ch:"Ch 11",topic:"Ch 11: Requirements",q:"Why is building a glossary important in the requirements phase?",a:"To understand the domain. A glossary defines domain-specific terms so the development team and client share a common vocabulary, preventing miscommunication."},
  {id:42,ch:"Ch 11",topic:"Ch 11: Requirements",q:"What is a use case?",a:"A use case models the interaction between the software product and its actors (users or external systems). It describes a sequence of actions the system performs to yield an observable result for an actor."},
  {id:43,ch:"Ch 11",topic:"Ch 11: Requirements",q:"What is an actor in a use case diagram?",a:"An actor is a role played by a user or external system that interacts with the software. Actors need not be human. One person can play multiple actor roles, and one actor role can be played by multiple people."},
  {id:44,ch:"Ch 11",topic:"Ch 11: Requirements",q:"What is the difference between functional and nonfunctional requirements?",a:"Functional requirements = WHAT the system must DO (features, behaviors, computations).\nNonfunctional requirements = constraints on HOW it operates (performance, security, scalability, usability, platform constraints)."},
  {id:45,ch:"Ch 11",topic:"Ch 11: Requirements",q:"Give examples of nonfunctional requirements.",a:"Platform constraints, response times (<2 sec), reliability (99.9% uptime), scalability (10,000 concurrent users), security (encryption), usability (accessible UI)."},
  {id:46,ch:"Ch 11",topic:"Ch 11: Requirements",q:"What is the 'overlapping actors' problem?",a:"When the same functionality applies to multiple actor types (e.g., both Manager and Employee can view reports). Solution: use actor specialization (generalization) in use case diagrams."},
  {id:47,ch:"Ch 11",topic:"Ch 11: Requirements",q:"What are structured vs. unstructured interviews?",a:"Structured: pre-planned questions asked in a fixed order. Gives consistent data but may miss unexpected insights.\nUnstructured: open-ended, conversational. May uncover hidden requirements but is harder to analyze."},
  {id:48,ch:"Ch 11",topic:"Ch 11: Requirements",q:"What is the MSG Foundation case study about?",a:"A nonprofit that offers mortgages. It involves P&I payments ($629.30/month example), escrow accounts for insurance/taxes, borrowing limits (<28% of gross income), closing costs (~$7000), and points (2% of principal)."},

  // ──────────────── Chapter 12: Classical Analysis ────────────────
  {id:49,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"What is a specification document?",a:"A contract between client and developers. It must be contradictory: informal enough for the client to read, yet formal enough for developers to implement from. This tension is a fundamental challenge."},
  {id:50,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"Why is natural language NOT good for specifications?",a:"It is inherently ambiguous. The Naur text-processing case study (1969-1989) showed that 6 groups of researchers over 20 years kept finding new faults in a simple natural language specification."},
  {id:51,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"Summarize the Naur text-processing specification saga.",a:"1969: Naur published spec. 1970: London found fault. 1971: London found 3 more. 1975: Goodenough & Gerhart found 3 more. 1985: Meyer found 12 faults. 1989: Schach found fault in Meyer's correction. Conclusion: natural language specs accumulate ambiguities."},
  {id:52,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"What is Structured Systems Analysis?",a:"A classical analysis method using Data Flow Diagrams (DFDs). Developed by DeMarco, Gane & Sarsen, and Yourdon (all essentially equivalent approaches). It uses stepwise refinement of DFDs."},
  {id:53,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"What are the 4 symbols used in a Data Flow Diagram (DFD)?",a:"1. Double square = source/destination (external entity)\n2. Arrow = data flow\n3. Rounded rectangle (bubble) = process\n4. Open-ended rectangle = data store"},
  {id:54,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"How does stepwise refinement work with DFDs?",a:"Start with a single high-level process (Level 0 / Context Diagram), then progressively decompose each process into more detailed sub-processes (Level 1, Level 2, etc.) until each process is simple enough to specify directly."},
  {id:55,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"What is a data dictionary?",a:"A structured repository that defines every data element, data flow, data store, and process in the system. It provides precise definitions to eliminate ambiguity."},
  {id:56,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"What is a decision tree in the context of specifications?",a:"A graphical representation of conditions and actions. Each branch represents a condition, and leaves represent actions. Used to specify complex business logic clearly."},
  {id:57,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"What is Gane & Sarsen's 9-step method?",a:"A systematic approach to structured analysis: build DFDs through stepwise refinement, create data dictionary, define process specifications, and verify the model. It provides a structured sequence for performing classical analysis."},

  // ──────────────── Chapter 13: OO Analysis ────────────────
  {id:58,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"What is noun extraction in OO analysis?",a:"A two-stage technique: 1) Write a concise problem definition, 2) Identify nouns as candidate classes. Then eliminate nouns outside the problem boundary and abstract nouns to get your final class list."},
  {id:59,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"In the Elevator Problem, which nouns were excluded and why?",a:"Floor, building, and door were excluded (outside the problem boundary). Movement, illumination, and request were excluded (abstract nouns, not classes). Remaining candidates: Elevator Class and Button Class."},
  {id:60,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"What subclasses emerged from the Elevator Problem's Button Class?",a:"Elevator Button Class (inside the elevator) and Floor Button Class (on each floor). These are specializations of the general Button Class."},
  {id:61,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"What is a CRC card?",a:"Class-Responsibility-Collaboration card — an index card listing a class name, its responsibilities (what it does), and its collaborators (other classes it works with). Used for brainstorming and testing OO designs."},
  {id:62,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"What is the God class antipattern?",a:"When one class (e.g., Elevator Controller) has too much control and responsibility. It becomes a bottleneck and violates the principle of distributed responsibility. Solution: distribute control across multiple smaller classes."},
  {id:63,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"What is responsibility-driven design?",a:"Design principle where you send a MESSAGE to a class to do something, rather than doing it externally. Example: Don't say 'Turn on elevator button' — say 'Send message to Elevator Button Class to turn itself on.'"},
  {id:64,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"What is a UML statechart?",a:"A diagram showing the states of an object, the events that cause transitions between states, and the actions performed during transitions. Used for dynamic modeling of object behavior."},
  {id:65,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"How was the God class problem resolved in the Elevator case study?",a:"By adopting a distributed, decentralized architecture with multiple controller classes: Floor Subcontroller, Elevator Subcontroller, Scheduler, and Sensor classes — each with focused responsibilities."},
  {id:66,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"How many iterations did the Elevator Problem class diagram go through?",a:"4 iterations. The design was progressively refined: identifying classes, discovering subclasses, adding a controller, then distributing control to avoid the God class antipattern."},
  {id:67,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"What is the Elevator Doors Class and how was it discovered?",a:"A class responsible for managing elevator door operations (open/close). It was discovered during CRC card analysis when assigning responsibilities — the doors needed their own behavior management."},

  // ──────────────── Chapter 14: Design ────────────────
  {id:68,ch:"Ch 14",topic:"Ch 14: Design",q:"What is transaction analysis?",a:"A design technique for systems that process different types of transactions (like an ATM). Each transaction type has its own processing path. Unlike data flow analysis, it handles branching based on transaction type."},
  {id:69,ch:"Ch 14",topic:"Ch 14: Design",q:"Why is DFA (Data Flow Analysis) poor for transaction processing?",a:"DFA assumes a sequential pipeline of data transformations. Transaction processing involves routing to different handlers based on transaction type, which DFA doesn't model well."},
  {id:70,ch:"Ch 14",topic:"Ch 14: Design",q:"What is data-oriented design?",a:"Design methods by Jackson (1975), Warnier (1976), and Orr (1981) that derive program structure from data structure. They have largely fallen out of fashion with the rise of OOD."},
  {id:71,ch:"Ch 14",topic:"Ch 14: Design",q:"What are the main steps of Object-Oriented Design?",a:"Step 1: Complete the class diagram — determine attribute formats, assign methods to appropriate classes.\nStep 2: Perform detailed design — design algorithms for each method using pseudocode derived from statecharts."},
  {id:72,ch:"Ch 14",topic:"Ch 14: Design",q:"What are the three OOD principles (A, B, C)?",a:"A: Information hiding — hide implementation details inside modules.\nB: If an operation is invoked by many clients, assign it to the server object, not the clients.\nC: Use responsibility-driven design — objects should manage their own behavior."},
  {id:73,ch:"Ch 14",topic:"Ch 14: Design",q:"In the Elevator OOD, where are open_doors/close_doors methods assigned?",a:"To the Elevator Doors Class (not Elevator Controller). This follows responsibility-driven design — the doors object manages its own behavior."},
  {id:74,ch:"Ch 14",topic:"Ch 14: Design",q:"In the Elevator OOD, where are turn_on/turn_off methods assigned?",a:"To the Button subclasses (Elevator Button Class and Floor Button Class). Each button is responsible for its own illumination state."},
  {id:75,ch:"Ch 14",topic:"Ch 14: Design",q:"What is PDL (Program Design Language)?",a:"Pseudocode used for detailed design. It derives from statecharts and specifies the logic of each method in structured English. It bridges the gap between design and implementation."},
  {id:76,ch:"Ch 14",topic:"Ch 14: Design",q:"What classes are in the MSG Foundation OOD final class diagram?",a:"User Interface Class, Manage Asset Class, Estimate Funds for Week Class, Investment Class, Asset Class, Mortgage Class, MSG Application Class, plus report classes. Each has defined attributes and methods."},
  {id:77,ch:"Ch 14",topic:"Ch 14: Design",q:"What is the purpose of detailed design?",a:"To specify exactly HOW each method works — its algorithm, data structures, and logic. This is typically done using pseudocode (PDL) derived from statecharts and the class diagram."},
  {id:78,ch:"Ch 14",topic:"Ch 14: Design",q:"What is information hiding?",a:"A design principle where each module hides its internal implementation behind a well-defined interface. Other modules can only interact through the interface, not by accessing internal data directly. This reduces coupling."},
  {id:79,ch:"Ch 14",topic:"Ch 14: Design",q:"What does 'corrected design using generic edit/update modules' mean in transaction analysis?",a:"Instead of writing separate edit/update code for each transaction type, create generic reusable modules that handle editing and updating. This promotes software reuse and reduces code duplication."},

  // ──────────────── Chapter 15: Implementation ────────────────
  {id:80,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What are the three ways to handle nested if-statements from the textbook?",a:"1. Badly formatted nested ifs (hard to read)\n2. Well-formatted but badly constructed (correct indentation but poor logic structure)\n3. Acceptably nested ifs (clear, well-structured logic)\nRule: nesting depth > 3 is poor practice."},
  {id:81,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What is the if-if combination simplification?",a:"If you have 'if c1 then if c2 then action', simplify to 'if (c1 AND c2) then action'. This reduces nesting depth and improves readability."},
  {id:82,ch:"Ch 15",topic:"Ch 15: Implementation",q:"Why is a nesting depth greater than 3 considered poor practice?",a:"Deep nesting makes code hard to read, understand, and maintain. It increases cognitive load (Miller's Law — 7 chunks), makes testing harder, and increases the likelihood of errors."},
  {id:83,ch:"Ch 15",topic:"Ch 15: Implementation",q:"Why are rigid programming standards (like max 50 lines per module) problematic?",a:"They can lead to coincidental cohesion — modules are split to meet size limits rather than logical boundaries. Standards must be meaningful and checkable by machine. Standards imposed from above without developer buy-in will be ignored."},
  {id:84,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What is the most common form of software reuse?",a:"Code reuse — using existing code components. However, artifacts from ALL workflows are reusable (requirements, designs, test cases, documentation, etc.)."},
  {id:85,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What is 'implementation-then-integration' and its problems?",a:"Code all modules separately, then combine them at the end. Problems: wasted effort on stubs/drivers, lack of fault isolation (when something breaks, you don't know which module caused it)."},
  {id:86,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What is top-down integration?",a:"Integrate starting from the top module down. mAbove is implemented before mBelow. Advantages: fault isolation is easier, stubs are not wasted (they test the interface), major design flaws are caught early."},
  {id:87,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What is bottom-up integration?",a:"Integrate starting from the lowest-level modules up. Test leaf modules first with drivers, then combine upward. Advantage: reusable low-level modules are tested early. Disadvantage: major design flaws found late."},
  {id:88,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What is sandwich integration?",a:"A combination of top-down and bottom-up integration. Top-level modules are integrated downward while bottom-level modules are integrated upward, meeting in the middle. Balances advantages of both approaches."},
  {id:89,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What are stubs and drivers?",a:"Stubs = dummy implementations of modules called BY the module under test (simulate lower-level modules).\nDrivers = test harnesses that CALL the module under test (simulate higher-level modules)."},
  {id:90,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What is the difference between logic artifacts and operational artifacts?",a:"Logic artifacts = design documents, algorithms, pseudocode (abstract/conceptual).\nOperational artifacts = actual executable code, compiled binaries (concrete/runnable)."},

  // ──────────────── Cross-Chapter: Key Concepts ────────────────
  {id:91,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"What is the relationship between UML and the Unified Process?",a:"UML is the modeling LANGUAGE (notation). The Unified Process is the METHODOLOGY that uses UML diagrams. UML can be used with any process; UP just happens to use it."},
  {id:92,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"Why does Schach say 'maintenance is a misnomer'?",a:"Because 'maintenance' implies fixing something that wore out. Software doesn't wear out — it is changed to fix faults (corrective), add features (perfective), or adapt to new environments (adaptive). 'Evolution' is a better term."},
  {id:93,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"What is the difference between a class diagram and a statechart?",a:"Class diagram = STATIC model showing classes, attributes, methods, and relationships.\nStatechart = DYNAMIC model showing states, transitions, and events for a single object over time."},
  {id:94,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"What are acceptance criteria?",a:"Conditions that the software must satisfy for the client to accept it. They are part of the specification document and serve as the basis for acceptance testing."},
  {id:95,ch:"Ch 14",topic:"Ch 14: Design",q:"Compare classical design methods vs. OO design methods.",a:"Classical: structure the system around data flow (DFDs, transaction analysis). Breaks down for complex interactions.\nOO: structure around objects with attributes and behaviors. Better for complex systems, supports reuse and information hiding."},
  {id:96,ch:"Ch 11",topic:"Ch 11: Requirements",q:"What is the business model in requirements elicitation?",a:"A description of the client's business processes, rules, and context. Understanding the business model is essential before gathering specific software requirements."},
  {id:97,ch:"Ch 7",topic:"Ch 7: Modules & Design",q:"Why is content coupling the worst type?",a:"One module directly accesses or modifies the internals of another module. This creates maximum interdependence — any change to one module's internals breaks the other. It violates information hiding."},
  {id:98,ch:"Ch 8",topic:"Ch 8: Reuse & Portability",q:"What lessons does the Ariane 5 case teach about COTS/reuse?",a:"1. Reused components must be re-validated in the new context.\n2. Assumptions from the original system may not hold.\n3. The cost of NOT validating reused code can be catastrophic ($500M+)."},
  {id:99,ch:"Ch 15",topic:"Ch 15: Implementation",q:"What makes a good programming standard?",a:"It must be: 1) Meaningful (serves readability/maintainability), 2) Checkable by machine (automated enforcement), 3) Accepted by developers (not imposed blindly from above). Bad standards lead to coincidental cohesion."},
  {id:100,ch:"Ch 12",topic:"Ch 12: Classical Analysis",q:"What is Sally's Software Shop case study used to illustrate?",a:"The DFD notation and stepwise refinement process. It shows how to build Level 0, Level 1, and Level 2 DFDs for a small business, demonstrating the 4 DFD symbols and progressive decomposition."},
  {id:101,ch:"Ch 13",topic:"Ch 13: OO Analysis",q:"Why is 'Turn on elevator button' an inappropriate action in OO design?",a:"It violates responsibility-driven design. Instead of externally manipulating the button, you should send a message to the Elevator Button Class asking it to turn itself on. Objects should manage their own state."},
  {id:102,ch:"Ch 14",topic:"Ch 14: Design",q:"What are the steps to go from a statechart to detailed design (pseudocode)?",a:"1. Identify each state and its transitions.\n2. For each transition, determine the triggering event, guard condition, and action.\n3. Express each method's logic as PDL (pseudocode) following the statechart flow."},
  {id:103,ch:"Ch 10",topic:"Ch 10: Unified Process",q:"How do the Unified Process phases relate to the waterfall model?",a:"They DON'T map 1-to-1. In UP, ALL 5 workflows (requirements, analysis, design, implementation, test) occur in EVERY phase, just with different emphasis. Waterfall does each step sequentially; UP is iterative."},
  {id:104,ch:"Ch 11",topic:"Ch 11: Requirements",q:"Can an actor be a non-human entity?",a:"Yes. Actors can be external systems, hardware devices, timers, or any entity that interacts with the software. Example: a payment gateway is an actor in an e-commerce system."},
  {id:105,ch:"Ch 1",topic:"Ch 1: Intro to SE",q:"What is the retirement phase?",a:"The final phase of the software life cycle where the software is removed from use. This happens when maintenance costs become too high, a replacement is available, or the software is no longer needed."}
];

        title: 'The Software Crisis & Birth of Software Engineering',
        body: '<div class="learn-def"><b>The Software Crisis</b><p>In 1968, the NATO conference in Garmisch, Germany brought together computer scientists to address a critical problem in the rapidly growing field of software development. The conference officially coined the term <b>"software engineering"</b> to describe a systematic approach to software development. Before this time, software development was largely informal and ad hoc.</p><p>The problem they were addressing became known as the <b>"software crisis"</b>: the widespread inability of organizations to deliver correct, maintainable software on time and within budget. Projects were constantly over budget, behind schedule, and delivered with numerous defects. The crisis was driven by the explosive growth in software complexity and the lack of proven methodologies to manage large-scale software projects.</p></div><div class="learn-def"><b>Definition of Software Engineering</b><p>Software Engineering is defined as: <b>"The production of fault-free software, delivered on time and within budget, that satisfies the client\'s needs and is easy to modify when requirements change."</b></p><p>This definition encompasses the entire lifecycle of software development: from initial requirements gathering through delivery and long-term maintenance. It emphasizes quality (fault-free), timeliness, cost control, client satisfaction, and maintainability — all critical factors that distinguish software engineering from casual programming.</p></div><div class="learn-warn"><b>Key Distinction: Program vs Software Product</b><p>A <b>program</b> is a small collection of code written by a single programmer for immediate personal use. It typically lacks documentation, formal testing, and was never intended for maintenance by others.</p><p>A <b>software product</b> is large-scale software developed by teams, accompanied by comprehensive documentation, thoroughly tested, designed for long-term maintenance by multiple developers, and built to evolve over time. Most real-world software development involves creating products, not programs.</p><p>The transition from program to product requires fundamentally different approaches: modular design, version control, testing frameworks, documentation standards, and change management processes.</p></div><div class="learn-warn"><b>The Challenge of Software\'s Intangibility</b><p>Unlike physical engineering (bridges, buildings, cars), software is abstract and intangible — it cannot be seen, touched, or inspected visually. This creates unique management challenges:</p><p><b>Progress Tracking:</b> In construction, you can see partially completed work. In software, a project can appear "90% done" for weeks, then reveal hidden complexity when integration begins.</p><p><b>Quality Assessment:</b> You cannot inspect code quality the way you inspect welding or concrete pour. Quality emerges only through testing and during actual use.</p><p><b>Resource Estimation:</b> Software tasks are notoriously difficult to estimate because invisible complexity is revealed only as development progresses.</p><p><b>Management Visibility:</b> Managers cannot walk through a software factory and assess progress visually. Reliance on metrics and reports is essential but can be misleading.</p></div>'
      },
      {
        title: 'Standish Group Data & Economic Aspects',
        body: '<div class="learn-def"><b>The Standish Group CHAOS Report</b><p>The Standish Group conducted a landmark study on software project outcomes across thousands of organizations. Their most recent comprehensive report (2020) provides sobering statistics on the state of software development:</p><p><b>Successful Projects:</b> 35% — delivered on time, within budget, with all features</p><p><b>Challenged Projects:</b> 46% — late, over-budget, missing features, or reduced scope</p><p><b>Failed (Cancelled) Projects:</b> 19% — cancelled mid-project or never deployed</p><p>This means that fewer than 1 in 3 software projects are delivered successfully according to original specifications.</p></div><div class="learn-example"><b>Historical Comparison: Improvement Over Time</b><p>In 1995, the Standish Group reported even worse results:</p><p><b>1995 Statistics:</b> Only 16% successful, 53% challenged, 31% cancelled</p><p><b>2020 Statistics:</b> 35% successful, 46% challenged, 19% cancelled</p><p>While there has been improvement (doubling the success rate in 25 years), the data shows that software project failures remain endemic. The failure rate has decreased, suggesting that modern methodologies (agile, DevOps, etc.) have provided some benefit, but project delivery remains problematic.</p></div><div class="learn-def"><b>The Economic Cost of Software</b><p>Software has become extraordinarily expensive for modern organizations. In most industries today, software costs <b>exceed hardware costs</b>, sometimes by factors of 10 or 100. Some industries (banking, insurance, healthcare) spend more on software than on all other technology combined.</p><p>The cost per line of code varies dramatically by project type and organizational maturity, ranging from a few dollars to hundreds of dollars per line. Large mission-critical systems (aerospace, medical devices, financial systems) can cost $1000+ per line of code when accounting for all development, testing, and verification activities.</p></div><div class="learn-warn"><b>The Hidden Cost of Software Defects</b><p>Software errors have enormous economic impact. Studies estimate that buggy software costs the global economy <b>$600+ billion annually</b> in wasted productivity, downtime, and damage. This includes:</p><p><b>Direct Costs:</b> IT downtime, emergency patches, customer support</p><p><b>Indirect Costs:</b> Lost productivity, damaged customer relationships, regulatory fines</p><p><b>Catastrophic Costs:</b> Medical device failures causing patient harm, financial system failures, security breaches exposing millions of users</p><p>A single critical bug in widely-deployed software can cost millions to fix and deploy.</p></div><div class="learn-example"><b>Case Study: The Y2K Bug</b><p>As the year 2000 approached, organizations discovered that millions of lines of legacy code represented dates using only two digits for the year (e.g., "98" for 1998). This meant that the year 2000 would be represented as "00" — indistinguishable from 1900.</p><p>The potential consequences were severe: financial calculations would be off by 100 years, database queries would fail, systems could crash, and calculations would be wildly incorrect.</p><p><b>Remediation Cost:</b> Approximately <b>$300 billion worldwide</b> was spent to identify and fix the two-digit year field in billions of lines of code across hundreds of thousands of systems.</p><p>This was arguably the largest software debugging project in history, and it highlighted how a seemingly small oversight in software design (using 2-digit year instead of 4-digit) could have catastrophic economic consequences.</p></div><div class="learn-example"><b>Scale of Modern Software</b><p>Modern software systems are staggeringly large and complex:</p><p><b>Operating Systems:</b> Windows has tens of millions of lines of code; Linux kernel has millions</p><p><b>Enterprise Applications:</b> SAP, Oracle, and similar ERP systems have millions of lines of code</p><p><b>Embedded Systems:</b> Modern automobiles contain 100+ million lines of code across dozens of ECUs (electronic control units)</p><p><b>Web Applications:</b> Facebook, Google, and similar companies maintain hundreds of millions of lines of code across their services</p><p>Managing systems of this scale requires sophisticated engineering practices, tools, and organizational structures. Ad hoc programming approaches are completely infeasible.</p></div>'
      },
      {
        title: 'Lifecycle Models & The Waterfall',
        body: '<div class="learn-def"><b>Software Development Life Cycle (SDLC) Concept</b><p>A <b>Software Development Life Cycle (SDLC)</b> is a structured process that describes the phases, activities, and deliverables involved in transforming a business need into a working software system. It provides a framework for organizing the work, managing resources, and measuring progress.</p><p>All SDLC models address the same fundamental activities:</p><p>1. <b>Requirements:</b> Understanding what the system must do</p><p>2. <b>Analysis:</b> Determining how to meet those requirements</p><p>3. <b>Design:</b> Specifying the system architecture and detailed design</p><p>4. <b>Implementation:</b> Writing and building the code</p><p>5. <b>Testing:</b> Verifying the system works correctly</p><p>6. <b>Deployment:</b> Installing and activating the system</p><p>7. <b>Maintenance:</b> Supporting and evolving the system</p><p>Different SDLC models organize these activities differently (sequential, iterative, evolutionary) but all must address each activity in some form.</p></div><div class="learn-def"><b>The Waterfall Model</b><p>The Waterfall model is the classic SDLC approach, structured as a sequence of six phases:</p><p><b>Phase 1: Requirements</b> — Gather and document what the system must do. Produce: Requirements Specification document</p><p><b>Phase 2: Analysis & Specification</b> — Analyze requirements for feasibility and develop a detailed specification. Produce: System Specification document</p><p><b>Phase 3: Design</b> — Design the system architecture and detailed design. Produce: Design documents including modules, data structures, interfaces</p><p><b>Phase 4: Implementation</b> — Write code based on the design. Produce: Source code, compilation/build artifacts</p><p><b>Phase 5: Testing & Postdelivery Maintenance</b> — Test the system, fix defects, deploy to production, and support post-release issues. Produce: Test reports, operational system</p><p><b>Phase 6: Retirement</b> — Eventually the system reaches end-of-life. Produce: Migration plan, archive of historical data</p><p>Each phase produces specific deliverables (documents, code, test results) that are reviewed and approved before proceeding to the next phase. Once a phase is complete, the team ideally does not revisit it.</p></div><div class="learn-example"><b>Feedback Loops in the Waterfall Model</b><p>While the waterfall is often depicted as a strictly sequential model, in practice, feedback loops exist at multiple levels:</p><p><b>Within-Phase Feedback:</b> During implementation, developers discover ambiguities in the design and may clarify with the design team without restarting the entire design phase.</p><p><b>Phase-to-Phase Feedback:</b> During testing, defects may require design changes, which could necessitate rework of portions of previous phases.</p><p><b>Incremental Phases:</b> Some waterfall implementations divide the project into multiple builds, where each build flows through the waterfall phases sequentially, allowing earlier builds to inform later ones.</p><p>Real-world waterfall projects are not purely sequential but allow controlled feedback to earlier phases for clarification and defect correction.</p></div><div class="learn-warn"><b>The "Moving Target" Problem: Requirements Change</b><p>The waterfall model assumes that requirements are <b>known, stable, and documented upfront</b>. This assumption is frequently violated in practice:</p><p><b>Incomplete Understanding:</b> Stakeholders don\'t fully understand what they need until they see a working system</p><p><b>Business Changes:</b> Markets shift, regulations change, competitive pressures force requirement modifications</p><p><b>Technology Evolution:</b> New capabilities emerge during development that stakeholders want to incorporate</p><p><b>Learning Curve:</b> As the development team learns more about the problem domain, they discover edge cases and scenarios not originally considered</p><p>Because waterfall doesn\'t accommodate requirements changes well (changes late in the project are expensive and disruptive), projects using strict waterfall often deliver systems that don\'t match final business needs.</p></div><div class="learn-def"><b>Waterfall as Documentation-Driven Development</b><p>The waterfall model is fundamentally <b>documentation-driven</b>: each phase produces formal documentation that must be reviewed, approved, and baselined before the next phase begins. This approach has advantages and disadvantages:</p><p><b>Advantages:</b> Clear deliverables, formal change control, traceability from requirements through implementation, suitable for regulated industries (medical devices, aerospace) where documentation is mandatory</p><p><b>Disadvantages:</b> Documentation can become outdated quickly as the system evolves, documentation burden slows development, can lead to "document-first, code-later" thinking that misses practical realities</p><p>The emphasis on documentation makes waterfall suitable for large teams, distributed teams, and projects in safety-critical domains where traceability and change history are essential for compliance and auditing.</p></div><div class="learn-warn"><b>Why Waterfall Still Matters Despite Its Limitations</b><p>Although agile and iterative methodologies have become dominant in recent years, waterfall captured something essential: the core activities that <b>all software development must perform</b>. Even agile projects must:</p><p>• Understand requirements (even if they evolve incrementally)</p><p>• Design solutions (even if designs are emergent and refactored)</p><p>• Implement features</p><p>• Test thoroughly</p><p>• Deploy to production</p><p>• Support and evolve the system</p><p>The waterfall model remains valuable as a reference model. Understanding waterfall is essential for historical context and for projects in domains where sequential development is appropriate (fixed-price contracts, highly stable requirements, regulated industries).</p></div>'
      },
      {
        title: 'Maintenance & Software Evolution',
        body: '<div class="learn-warn"><b>Maintenance is the Most Expensive Phase</b><p>A critical reality of software economics: the maintenance phase, which spans from initial deployment until system retirement, consumes <b>67% or more of the total lifetime cost</b> of a software system. In some large organizations, maintenance costs exceed new development costs by factors of 3:1 or higher.</p><p>This means that every decision made in earlier phases (design elegance, code clarity, documentation quality) has enormous long-term economic consequences. A design decision that saves 5% of design effort but creates maintenance problems will likely cost 5-10x more to address over the system\'s lifetime.</p><p>Modern software organizations have learned that investing in code quality, automated testing, documentation, and design maintainability is not a luxury but an economic necessity.</p></div><div class="learn-def"><b>Three Types of Maintenance: Corrective, Perfective, Adaptive</b><p><b>Corrective Maintenance (15-17% of maintenance cost)</b> — Fixing bugs and defects discovered in production. Corrective maintenance addresses problems where the system does not behave as specified. Examples: "Login fails when password contains special characters," "Monthly reports calculate totals incorrectly," "System crashes when processing files larger than 2GB."</p><p>Corrective maintenance is reactive — it responds to failures reported by users. It requires rapid response (outages must be fixed quickly) and can be unpredictable in volume and severity. Critical production bugs demand emergency fixes, sometimes requiring on-call support teams.</p><p><b>Perfective Maintenance (60-63% of maintenance cost)</b> — Adding new features, improving performance, enhancing user experience, and implementing optimizations. Perfective maintenance is proactive — it responds to user requests and business needs. Examples: "Add multi-language support," "Optimize database queries to improve response time," "Add mobile app version," "Implement single sign-on integration," "Add reporting capabilities."</p><p>Perfective maintenance is the most expensive because businesses constantly want new features and improvements. It\'s essentially evolutionary development that continues post-release. This is where most maintenance effort is spent.</p><p><b>Adaptive Maintenance (18-20% of maintenance cost)</b> — Adapting the system to changes in its external environment. Examples: "Support new version of Java runtime," "Port from Windows to Linux," "Adapt to new operating system release," "Update for new payment processor API," "Comply with GDPR regulations," "Update for new mobile phone screen sizes."</p><p>Adaptive maintenance is reactive but periodic — driven by external changes that force the system to evolve to remain compatible.</p></div><div class="learn-example"><b>Real-World Maintenance Case Study: Legacy System</b><p>A financial institution maintained a loan origination system originally developed in the 1980s using COBOL. The system had processed billions of dollars in loans and was deeply embedded in business processes.</p><p><b>Maintenance Reality:</b> The original development cost was estimated at $2 million (1980s dollars). Over 30 years, the system consumed approximately $50+ million in maintenance costs. A new development team was brought in initially, but most original developers had retired. Documentation was outdated or missing. The codebase was characterized by:</p><p>• Hardcoded business logic scattered throughout the code</p><p>• Cryptic variable names ("I3, J7, WKAREA")</p><p>• No unit tests (testing was done manually in production environment)</p><p>• Each change required days of analysis to understand ripple effects</p><p><b>Lesson:</b> Poor design decisions in the original development created decades of expensive maintenance burden. Every day spent improving code quality initially would have paid dividends through easier maintenance.</p></div><div class="learn-def"><b>From "Maintenance" to "Evolution": A Conceptual Shift</b><p>The term "maintenance" itself is misleading — it suggests fixing something broken, like a car repair. A more accurate term is <b>"evolution"</b> or <b>"post-release development"</b>.</p><p><b>Why the shift in terminology?</b> When viewed as "evolution," it becomes clear that post-release development is not qualitatively different from pre-release development:</p><p>• Both involve adding features (new functionality in original development, new features in evolution)</p><p>• Both involve fixing bugs (bugs in development phase are caught in testing; bugs in evolution are caught in production)</p><p>• Both involve refactoring (architectural improvements occur before and after release)</p><p>The key insight: <b>deployment to production is not an endpoint but a milestone in continuous development</b>. Modern practices like continuous deployment, microservices, and feature flags treat the system as continuously evolving rather than static after initial release.</p></div><div class="learn-warn"><b>The Critical Importance of Maintainability</b><p>Because maintenance is so expensive and extended, writing maintainable code is not a "nice to have" but a core engineering imperative. Key aspects of maintainable code:</p><p><b>Clarity:</b> Code should be written for humans, not compilers. Another developer should understand the purpose and logic of code within minutes of reading it. Use meaningful variable names, clear algorithms, helpful comments.</p><p><b>Modularity:</b> Divide the system into logical components with clear responsibilities. A change should require modifying only one or a few modules, not the entire codebase.</p><p><b>Testability:</b> Every component should be independently testable. Without unit tests, maintenance becomes dangerous (changes break unknown things) and expensive (testing requires manual effort).</p><p><b>Documentation:</b> Document the "why" (design decisions, rationale) not just the "what" (code comments). Document system architecture, key algorithms, known limitations, and prerequisites.</p><p><b>Consistency:</b> Use consistent coding style, naming conventions, and patterns throughout the codebase. Inconsistency makes code harder to understand.</p></div><div class="learn-def"><b>Lehman\'s Laws of Program Evolution</b><p>Meir Lehman conducted a landmark study on how large software systems evolve over time. He formulated several laws that describe patterns in system evolution:</p><p><b>Law I: Continuing Change:</b> A program that is used must be continually adapted or it becomes less useful. Programs cannot remain static — user needs, business contexts, and technology platforms change continuously.</p><p><b>Law II: Increasing Complexity:</b> As a program evolves, its complexity grows. Without active refactoring and architecture improvement, systems tend toward increased complexity, making them harder to understand and modify.</p><p><b>Law III: Self Regulation:</b> The process of program evolution is self-regulating with respect to the rate of change. There are implicit limits to how fast a system can evolve without destabilizing.</p><p><b>Law IV: Conservation of Organizational Stability:</b> The organization managing a program (or set of programs) tends to remain relatively constant in resource allocation, in terms of total effort to manage it.</p><p><b>Law V: Conservation of Familiarity:</b> As programs evolve, the rate of change is approximately constant, as it is constrained by the knowledge maintenance personnel have of the system.</p><p><b>Law VI: Continuing Growth:</b> The functional content of programs must continually increase to maintain user satisfaction. Simple maintenance (bug fixes) is insufficient; users demand new features.</p><p>These laws have profound implications: if you don\'t actively refactor and improve system architecture during evolution, the system will become unmaintainable. Maintaining and evolving software requires just as much discipline and skill as initial development.</p></div>'

        title: 'Scope of Software Engineering',
        body: '<div class="learn-def"><b>Software Engineering Encompasses the Entire Lifecycle</b><p>A critical distinction: <b>Software Engineering is not the same as programming</b>. Programming is the act of writing code. Software Engineering is a discipline that encompasses:</p><p><b>Requirements Management:</b> Understanding, documenting, and managing what the system must do. This involves stakeholders (users, business analysts, domain experts) articulating needs, priorities, and constraints.</p><p><b>Analysis:</b> Analyzing requirements for feasibility, completeness, and consistency. Identifying risks, dependencies, and architectural implications before code is written.</p><p><b>Design:</b> Designing the system architecture, data structures, interfaces, and algorithms. Design decisions shape code quality, performance, scalability, and maintainability.</p><p><b>Implementation:</b> Writing code that realizes the design. But implementation is only one component of engineering.</p><p><b>Testing & Quality Assurance:</b> Verifying that the system works correctly, performs adequately, and meets non-functional requirements. Testing finds defects, validates requirements, and provides confidence in quality.</p><p><b>Integration:</b> Combining components built by different teams or in different phases. Integration testing verifies that components work together correctly.</p><p><b>Deployment:</b> Installing the system in production environments, managing version control, handling rollbacks if necessary, and supporting the transition from old to new systems.</p><p><b>Maintenance & Evolution:</b> Supporting the system post-release, fixing defects, adding features, adapting to changes, and eventually retiring the system.</p><p>All of these activities are within the scope of software engineering.</p></div><div class="learn-def"><b>Teamwork is Essential for Modern Software</b><p>Individual programmers can write small programs, but modern software systems are far too large and complex for any individual to fully understand. Most real-world software is developed by teams that may include:</p><p><b>Requirements Analysts:</b> Understand business needs and translate them to system requirements</p><p><b>Architects:</b> Design the overall system structure and make high-level technical decisions</p><p><b>Developers:</b> Implement the design in code</p><p><b>Test Engineers:</b> Design and execute tests, verify quality</p><p><b>DevOps/Infrastructure Engineers:</b> Manage deployment infrastructure, monitoring, and operations</p><p><b>Project Managers:</b> Coordinate work, manage schedules and resources</p><p><b>Technical Writers:</b> Create documentation and user guides</p><p>Effective teamwork requires clear communication, well-defined interfaces between components, consistent coding standards, version control systems, and project management practices. Software engineering provides frameworks and practices to enable teams to collaborate effectively at scale.</p></div><div class="learn-warn"><b>Ethical Considerations in Software Engineering</b><p>As software systems become increasingly critical to society (medical devices, financial systems, transportation, infrastructure), software engineers bear responsibility for the societal impact of their work. Ethical considerations include:</p><p><b>Safety:</b> Systems must not cause harm. Medical device software must not cause patient injury; transportation software must not cause accidents.</p><p><b>Privacy:</b> Systems collecting personal data must protect user privacy. Unauthorized data collection, retention, or sharing is unethical.</p><p><b>Fairness:</b> Algorithmic decision-making (hiring systems, loan approval, criminal justice) must not discriminate unfairly based on protected characteristics.</p><p><b>Security:</b> Systems must be protected against malicious attacks. Shipping insecure software enables hackers to steal data, commit fraud, or cause harm.</p><p><b>Environmental Impact:</b> Software choices affect energy consumption. Inefficient algorithms and infrastructure can have significant environmental costs.</p><p><b>Honest Communication:</b> Engineers must honestly report risks and limitations. Misrepresenting capabilities or risks is unethical.</p><p>Professional organizations like ACM and IEEE have published codes of ethics for software engineers. These codes emphasize that engineers have responsibility not only to their employers but to society.</p></div><div class="learn-def"><b>Software Engineering vs. Computer Science</b><p><b>Computer Science</b> is a scientific discipline that studies computation, algorithms, and computational theory. Research questions include: "What problems can be computed?" "What is the computational complexity of this algorithm?" "How can we design more efficient algorithms?" CS is theory-focused and seeks to advance fundamental understanding.</p><p><b>Software Engineering</b> is an engineering discipline that applies techniques to build practical software systems. Engineering questions include: "How do we build a system that meets these requirements?" "How do we manage complexity?" "How do we ensure quality?" "How do we make the system maintainable?" SE is practice-focused and seeks to solve real-world problems.</p><p><b>Relationship:</b> Computer Science provides foundations that Software Engineering builds upon. Algorithms from CS are used by SE. But SE also draws from other disciplines: psychology (human-computer interaction), business (project management), and organizational behavior.</p><p><b>Academic vs. Industry:</b> CS academics may study theoretical algorithms; SE practitioners adapt those algorithms to real systems subject to resource and time constraints. An optimal algorithm is worthless if it consumes more memory or time than available.</p></div><div class="learn-warn"><b>Need for Professionalism in Software Engineering</b><p>Other engineering disciplines (civil, mechanical, electrical) have formal licensing, strict professional standards, and legal liability frameworks. Software engineering historically lacked this professionalism, with some consequences:</p><p><b>Lack of Accountability:</b> When software fails, responsibility is often unclear. When a bridge collapses, a civil engineer is held legally accountable. When software causes a medical device to malfunction, responsibility diffuses across the organization.</p><p><b>Quality Variation:</b> Professional engineers follow established standards and best practices. Software development practices vary widely, from highly disciplined to completely ad hoc.</p><p><b>Professional Development:</b> Licensed engineers are required to maintain competence through continuing education. Software engineers, except in safety-critical domains, have no such requirement.</p><p><b>Trend Toward Professionalism:</b> As software becomes more critical, there are increasing efforts to professionalize the field. Certifications (CSQA, ISTQB), standards (ISO 9001, DO-178C), and legal frameworks are becoming more common, particularly in safety-critical domains.</p><p>The maturation of software engineering as a profession remains ongoing. Practitioners should view themselves not as coders but as engineers with responsibility for quality, safety, and maintainability.</p></div>'
